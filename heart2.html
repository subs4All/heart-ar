<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Eran ❤️ Mika AR</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- A-Frame -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

    <!-- AR.js (A-Frame version) -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <!-- Particle system -->
    <script src="https://unpkg.com/aframe-particle-system-component@1.0.0/dist/aframe-particle-system-component.min.js"></script>

    <style>
      body {
        margin: 0;
        overflow: hidden;
      }
    </style>
  </head>

  <body>
    <a-scene
      embedded
      vr-mode-ui="enabled: false"
      renderer="logarithmicDepthBuffer: true"
      arjs="sourceType: webcam; debugUIEnabled: false;"
    >
      <!-- Camera -->
      <a-entity camera></a-entity>

      <!-- Marker (hiro) -->
      <a-marker preset="hiro">
        <!-- Cake plate -->
        <a-cylinder position="0 0 0" radius="0.6" height="0.05" color="#ffffff"></a-cylinder>

        <!-- Cake floors -->
        <a-cylinder position="0 0.15 0" radius="0.45" height="0.25" color="#ffb6c1"></a-cylinder>
        <a-cylinder position="0 0.4 0" radius="0.32" height="0.22" color="#ffc0cb"></a-cylinder>
        <a-cylinder position="0 0.62 0" radius="0.2" height="0.2" color="#ffe4e1"></a-cylinder>

        <!-- Candle -->
        <a-cylinder position="0 0.85 0" radius="0.03" height="0.25" color="#ffffff"></a-cylinder>
        <a-sphere position="0 1.02 0" radius="0.05" color="#ffdd55" emissive="#ffdd55"></a-sphere>

        <!-- Text -->
        <a-text
          value="Eran love Mika"
          position="0 0.45 0.35"
          rotation="0 180 0"
          align="center"
          color="#5b0033"
          width="1.8"
        ></a-text>

        <!-- Sparks -->
        <a-entity
          position="0 1.1 0"
          particle-system="preset: dust; color: #ffdd55, #ff4b6e, #ffffff; particleCount: 400; size: 0.03; velocityValue: 0 1 0;"
        ></a-entity>

        <!-- Rotation animation -->
        <a-animation
          attribute="rotation"
          dur="12000"
          to="0 360 0"
          repeat="indefinite"
          easing="linear"
        ></a-animation>
      </a-marker>

      <!-- Needed for AR.js -->
      <a-entity arjs-debug></a-entity>
    </a-scene>
  </body>
</html>
