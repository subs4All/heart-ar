<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Eran ❤️ Mika AR</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- A-Frame -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

    <!-- WebXR AR support -->
    <script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.0.0/dist/aframe-extras.min.js"></script>

    <style>
      body {
        margin: 0;
        overflow: hidden;
        background: #000;
        font-family: sans-serif;
      }
      #enterAR {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        padding: 14px 24px;
        border-radius: 999px;
        border: none;
        font-size: 16px;
        font-weight: 600;
        background: #ff4b6e;
        color: #fff;
        z-index: 10;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.35);
      }
    </style>
  </head>

  <body>
    <button id="enterAR">Start AR ❤️</button>

    <a-scene
      renderer="colorManagement: true; physicallyCorrectLights: true"
      xr-mode-ui="enabled: true"
      embedded
      vr-mode-ui="enabled: false"
      arjs="sourceType: webcam;"
    >
      <a-entity id="cameraRig">
        <a-camera></a-camera>
      </a-entity>

      <!-- Cake group (initially hidden) -->
      <a-entity id="cake" visible="false">
        <!-- Cake plate -->
        <a-cylinder position="0 0 0" radius="0.6" height="0.05" color="#ffffff"></a-cylinder>

        <!-- Cake floors -->
        <a-cylinder position="0 0.15 0" radius="0.45" height="0.25" color="#ffb6c1"></a-cylinder>
        <a-cylinder position="0 0.4 0" radius="0.32" height="0.22" color="#ffc0cb"></a-cylinder>
        <a-cylinder position="0 0.62 0" radius="0.2" height="0.2" color="#ffe4e1"></a-cylinder>

        <!-- Candle -->
        <a-cylinder position="0 0.85 0" radius="0.03" height="0.25" color="#ffffff"></a-cylinder>
        <a-sphere position="0 1.02 0" radius="0.05" color="#ffdd55" emissive="#ffdd55"></a-sphere>

        <!-- Text -->
        <a-text
          value="Eran love Mika"
