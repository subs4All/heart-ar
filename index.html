<script>
/* ══════════════════════════════════════
   PARTICLES
══════════════════════════════════════ */
class Spark {
  constructor(x,y,vx,vy,color){
    this.x=x;this.y=y;this.vx=vx;this.vy=vy;this.color=color;
    this.size=Math.random()*5+1;this.life=1;
    this.decay=Math.random()*.018+.006;this.trail=[];
  }
  update(){
    this.trail.push({x:this.x,y:this.y});
    if(this.trail.length>10)this.trail.shift();
    this.x+=this.vx;this.y+=this.vy;
    this.vy+=.1;this.vx*=.98;
    this.life-=this.decay;this.size*=.98;
  }
  draw(c){
    if(this.life<=0)return;
    for(let i=0;i<this.trail.length;i++){
      const t=this.trail[i],f=i/this.trail.length;
      c.save();c.globalAlpha=f*this.life*.4;
      c.fillStyle=this.color;c.shadowColor=this.color;c.shadowBlur=10;
      c.beginPath();c.arc(t.x,t.y,this.size*.6*f,0,Math.PI*2);c.fill();c.restore();
    }
    c.save();c.globalAlpha=this.life;
    c.fillStyle=this.color;c.shadowColor=this.color;c.shadowBlur=16;
    c.beginPath();c.arc(this.x,this.y,this.size,0,Math.PI*2);c.fill();c.restore();
  }
}

class Ember {
  constructor(cx,cy){
    const a=Math.random()*Math.PI*2,s=Math.random()*11+3;
    this.x=cx+(Math.random()-.5)*40;this.y=cy+(Math.random()-.5)*40;
    this.vx=Math.cos(a)*s;this.vy=Math.sin(a)*s-4;
    const C=['#ff2255','#ff6688','#ffaa33','#ff44cc','#ffffff','#ffdd55','#44ffcc','#ff88aa','#ffcc00'];
    this.color=C[Math.floor(Math.random()*C.length)];
    this.size=Math.random()*7+2;this.life=1;
    this.decay=Math.random()*.011+.004;this.sparkChance=.1;this.trail=[];
  }
  update(all){
    this.trail.push({x:this.x,y:this.y});
    if(this.trail.length>14)this.trail.shift();
    this.x+=this.vx;this.y+=this.vy;
    this.vy+=.07;this.vx*=.97;
    this.life-=this.decay;this.size*=.97;
    if(Math.random()<this.sparkChance&&this.life>.3){
      const a2=Math.random()*Math.PI*2,s2=Math.random()*4+1;
      all.push(new Spark(this.x,this.y,Math.cos(a2)*s2,Math.sin(a2)*s2-1.5,this.color));
    }
  }
  draw(c){
    if(this.life<=0)return;
    for(let i=0;i<this.trail.length;i++){
      const t=this.trail[i],f=i/this.trail.length;
      c.save();c.globalAlpha=f*this.life*.55;
      c.fillStyle=this.color;c.shadowColor=this.color;c.shadowBlur=22;
      c.beginPath();c.arc(t.x,t.y,this.size*f,0,Math.PI*2);c.fill();c.restore();
    }
    c.save();c.globalAlpha=this.life;
    c.fillStyle=this.color;c.shadowColor=this.color;c.shadowBlur=28;
    c.beginPath();c.arc(this.x,this.y,this.size,0,Math.PI*2);c.fill();
    c.fillStyle='white';c.shadowBlur=6;c.globalAlpha=this.life*.85;
    c.beginPath();c.arc(this.x,this.y,this.size*.4,0,Math.PI*2);c.fill();c.restore();
  }
}

/* ══════════════════════════════════════
   CAKE  — drawn at screen center, large
══════════════════════════════════════ */
function drawBigCake(c, cx, cy, masterScale, alpha, t) {
  if(alpha < 0.01) return;
  c.save();
  c.globalAlpha = alpha;
  c.translate(cx, cy);
  c.scale(masterScale, masterScale);

  // ── tier data (drawn bottom→top, y goes negative upward) ──
  // each tier: { hw, h, col, topCol, drips }
  const tiers = [
    { hw:160, h:70,  col:'#e8294e', top:'#f04060', stripe:'#ff6688' },
    { hw:115, h:60,  col:'#f5416b', top:'#ff5580', stripe:'#ffaabb' },
    { hw: 75, h:50,  col:'#ff6688', top:'#ff88aa', stripe:'#ffccdd' },
  ];

  let baseY = 0; // starts at 0, goes negative as we stack

  // plate
  c.save();
  c.fillStyle='#f5c842'; c.shadowColor='#c8a020'; c.shadowBlur=14;
  c.beginPath(); c.ellipse(0, 10, 175, 18, 0, 0, Math.PI*2); c.fill();
  c.fillStyle='#ffe070';
  c.beginPath(); c.ellipse(0, 6, 170, 14, 0, 0, Math.PI*2); c.fill();
  c.restore();

  tiers.forEach((tier, ti) => {
    const { hw, h, col, top, stripe } = tier;
    const by = baseY; // bottom y of this tier

    // shadow under tier
    c.save();
    c.fillStyle='rgba(0,0,0,0.18)';
    c.beginPath(); c.ellipse(4, by+6, hw+6, 10, 0, 0, Math.PI*2); c.fill();
    c.restore();

    // main body
    c.save();
    c.fillStyle = col;
    c.shadowColor = '#aa0030'; c.shadowBlur = 8;
    c.beginPath();
    c.moveTo(-hw, by);
    c.lineTo(-hw, by-h+10);
    c.quadraticCurveTo(-hw, by-h, -hw+10, by-h);
    c.lineTo(hw-10, by-h);
    c.quadraticCurveTo(hw, by-h, hw, by-h+10);
    c.lineTo(hw, by);
    c.closePath();
    c.fill();
    c.restore();

    // side highlight strip
    c.save();
    c.fillStyle='rgba(255,255,255,0.12)';
    c.beginPath();
    c.moveTo(-hw+4, by-8);
    c.lineTo(-hw+4, by-h+14);
    c.quadraticCurveTo(-hw+4, by-h+4, -hw+14, by-h+4);
    c.lineTo(hw-14, by-h+4);
    c.quadraticCurveTo(hw-4, by-h+4, hw-4, by-h+14);
    c.lineTo(hw-4, by-8);
    c.closePath();
    c.fill();
    c.restore();

    // horizontal stripe bands
    const bandCount = 3;
    for(let b=0;b<bandCount;b++){
      const bandY = by - h*(b+1)/(bandCount+1);
      c.save();
      c.fillStyle = 'rgba(255,255,255,0.1)';
      c.fillRect(-hw+2, bandY-3, hw*2-4, 5);
      c.restore();
    }

    // top ellipse (3D face)
    c.save();
    c.fillStyle = top;
    c.strokeStyle = stripe; c.lineWidth = 2;
    c.shadowColor = '#ff2255'; c.shadowBlur = 6;
    c.beginPath(); c.ellipse(0, by-h, hw, hw*0.24, 0, 0, Math.PI*2);
    c.fill(); c.stroke();
    c.restore();

    // frosting drips
    const dripsN = Math.round(hw / 22);
    c.save(); c.fillStyle='#fff'; c.shadowColor='#eee'; c.shadowBlur=5;
    for(let d=0;d<dripsN;d++){
      const dx = -hw + hw*2/(dripsN-1||1)*d;
      const dh = 14 + Math.sin(d*2.1+ti*1.3)*8;
      const dw = 10 + Math.sin(d*1.5)*4;
      c.beginPath();
      c.moveTo(dx-dw/2, by-h+4);
      c.bezierCurveTo(dx-dw/2, by-h+dh, dx+dw/2, by-h+dh, dx+dw/2, by-h+4);
      c.closePath(); c.fill();
    }
    // frosting ellipse on top
    c.fillStyle='rgba(255,255,255,0.55)';
    c.beginPath(); c.ellipse(0, by-h, hw*.8, hw*0.16, 0, 0, Math.PI*2); c.fill();
    c.restore();

    // sprinkle dots on sides
    c.save();
    const sprinkleColors=['#ffee44','#44ffcc','#ff44cc','#44aaff','#ff8833'];
    const sprN = Math.round(hw/14);
    for(let d=0;d<sprN;d++){
      const dx = -hw*0.88 + hw*1.76/(sprN-1)*d;
      const dy = by - h*0.38 - Math.sin(d*1.2+ti)*h*0.22;
      c.fillStyle = sprinkleColors[d%sprinkleColors.length];
      c.shadowColor = sprinkleColors[d%sprinkleColors.length]; c.shadowBlur=6;
      c.save(); c.translate(dx,dy); c.rotate(d*0.6);
      c.fillRect(-5,-2,10,4); c.restore();
    }
    c.restore();

    baseY -= h; // move up for next tier
  });

  // ── CANDLES (7 on top tier) ──
  const topY = baseY; // y of top of top tier
  const candleXs = [-54,-36,-18, 0, 18, 36, 54];
  const candleCols = ['#ff3344','#3399ff','#ffcc00','#aa44ff','#44dd88','#ff8833','#ff44aa'];
  candleXs.forEach((cx2, i) => {
    const cBase = topY;
    const cH = 28;
    // body
    c.save();
    c.fillStyle = candleCols[i];
    c.strokeStyle='rgba(0,0,0,0.25)'; c.lineWidth=1.5;
    c.beginPath(); c.roundRect(cx2-6, cBase-cH, 12, cH, 3); c.fill(); c.stroke();
    // spiral stripe
    c.fillStyle='rgba(255,255,255,0.4)';
    for(let s=0;s<4;s++) c.fillRect(cx2-6, cBase-cH+s*7, 12, 3.5);
    c.restore();
    // flame flicker
    const flk = Math.sin(t*9+i*1.7)*2.5;
    const fh = 18+flk;
    // outer flame
    c.save();
    c.fillStyle='#ff8800'; c.shadowColor='#ffaa00'; c.shadowBlur=18;
    c.beginPath();
    c.moveTo(cx2, cBase-cH-fh);
    c.bezierCurveTo(cx2+8,cBase-cH-fh*.5, cx2+5,cBase-cH, cx2,cBase-cH);
    c.bezierCurveTo(cx2-5,cBase-cH, cx2-8,cBase-cH-fh*.5, cx2,cBase-cH-fh);
    c.fill();
    // inner flame
    c.fillStyle='#ffff88'; c.shadowColor='#ffff00'; c.shadowBlur=10;
    c.beginPath();
    c.moveTo(cx2, cBase-cH-fh*.72);
    c.bezierCurveTo(cx2+4,cBase-cH-fh*.4, cx2+3,cBase-cH, cx2,cBase-cH);
    c.bezierCurveTo(cx2-3,cBase-cH, cx2-4,cBase-cH-fh*.4, cx2,cBase-cH-fh*.72);
    c.fill();
    c.restore();
  });

  // ── BIG TEXT "Eran loves Mika" on BOTTOM tier ──
  // bottom tier spans from 0 to -tiers[0].h, center at -tiers[0].h/2
  const textY = -tiers[0].h * 0.5;

  // outline pass for readability
  c.save();
  c.font = 'bold 32px Georgia, serif';
  c.textAlign = 'center';
  c.textBaseline = 'middle';
  c.strokeStyle = '#880022';
  c.lineWidth = 6;
  c.lineJoin = 'round';
  c.strokeText('Eran loves Mika', 0, textY);
  c.restore();

  // glow pass
  c.save();
  c.font = 'bold 32px Georgia, serif';
  c.textAlign = 'center';
  c.textBaseline = 'middle';
  c.shadowColor = '#ff2255'; c.shadowBlur = 20;
  c.fillStyle = '#fff';
  c.globalAlpha = alpha * (0.9 + Math.sin(t*2.5)*0.1);
  c.fillText('Eran loves Mika', 0, textY);
  c.restore();

  // crisp top layer
  c.save();
  c.font = 'bold 32px Georgia, serif';
  c.textAlign = 'center';
  c.textBaseline = 'middle';
  c.fillStyle = '#ffe0ea';
  c.globalAlpha = alpha;
  c.fillText('Eran loves Mika', 0, textY);
  c.restore();

  c.restore(); // master
}

function lighten(hex,amt){
  let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgb(${Math.min(255,r+amt)},${Math.min(255,g+amt)},${Math.min(255,b+amt)})`;
}

/* ══════════════════════════════════════
   STATE
══════════════════════════════════════ */
let overlayCanvas, ctx, videoEl;
let detCanvas, detCtx;
let particles=[], ringEffects=[];
let found=false, confidence=0;
let heartCX=0, heartCY=0, heartSize=100;
let heartGlowAlpha=0, heartGlowTarget=0;
let cakeAlpha=0, cakeTarget=0, cakeEntrance=0;
let burstTimer=0, time=0, lastDetect=0;
let detectedBounds=null;

/* ══════════════════════════════════════
   HEART DRAWING
══════════════════════════════════════ */
function burst(cx,cy,n){ for(let i=0;i<n;i++) particles.push(new Ember(cx,cy)); }

function heartPath(c,cx,cy,s){
  c.beginPath();
  for(let t=0;t<=Math.PI*2;t+=.04){
    const x=s*16*Math.pow(Math.sin(t),3)/16;
    const y=-s*(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t))/16;
    t<.02?c.moveTo(cx+x,cy+y):c.lineTo(cx+x,cy+y);
  }
  c.closePath();
}

function drawGlowHeart(cx,cy,s,alpha,t){
  const ss=s*(1+Math.sin(t*3)*.06);
  for(let i=4;i>=0;i--){
    ctx.save();ctx.globalAlpha=alpha*(.12-i*.02);
    ctx.strokeStyle='#ff2255';ctx.lineWidth=5+i*10;
    ctx.shadowColor='#ff2255';ctx.shadowBlur=35+i*12;
    ctx.lineJoin='round';heartPath(ctx,cx,cy,ss);ctx.stroke();ctx.restore();
  }
  ctx.save();ctx.globalAlpha=alpha;
  ctx.strokeStyle='#ff6688';ctx.lineWidth=2.5;
  ctx.shadowColor='#ff99aa';ctx.shadowBlur=18;
  ctx.lineJoin='round';heartPath(ctx,cx,cy,ss);ctx.stroke();ctx.restore();
}

function drawRing(cx,cy,r,alpha){
  ctx.save();ctx.globalAlpha=alpha;
  ctx.strokeStyle='#ff4466';ctx.lineWidth=2.5;
  ctx.shadowColor='#ff4466';ctx.shadowBlur=22;
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.stroke();ctx.restore();
}

/* ══════════════════════════════════════
   DETECTION
══════════════════════════════════════ */
function analyzeFrame(){
  if(!videoEl||videoEl.readyState<2)return;
  detCtx.drawImage(videoEl,0,0,detCanvas.width,detCanvas.height);
  const d=detCtx.getImageData(0,0,detCanvas.width,detCanvas.height).data;
  const w=detCanvas.width, h=detCanvas.height;
  let cnt=0, minX=w,maxX=0,minY=h,maxY=0;
  for(let i=0;i<d.length;i+=4){
    const r=d[i],g=d[i+1],b=d[i+2];
    if((r>80&&g<70&&b<70&&r>g*1.8&&r>b*1.8)||(r>55&&g<38&&b<38&&r>g+18)){
      cnt++;
      const px=(i/4)%w, py=Math.floor((i/4)/w);
      if(px<minX)minX=px; if(px>maxX)maxX=px;
      if(py<minY)minY=py; if(py>maxY)maxY=py;
    }
  }
  if(cnt<60){ confidence=Math.max(0,confidence-.06); return; }
  const bw=maxX-minX, bh=maxY-minY, asp=bw/(bh||1), den=cnt/(bw*bh||1);
  if(asp>.4&&asp<2.2&&den>.004&&den<.45&&bw>25&&bh>25){
    confidence=Math.min(1,confidence+.09);
    detectedBounds={x:minX,y:minY,w:bw,h:bh};
  } else { confidence=Math.max(0,confidence-.1); }
}

/* ══════════════════════════════════════
   RENDER
══════════════════════════════════════ */
function render(){
  time+=.016;
  const W=overlayCanvas.width, H=overlayCanvas.height;
  ctx.clearRect(0,0,W,H);
  if(Date.now()-lastDetect>80){ analyzeFrame(); lastDetect=Date.now(); }

  const isDetected = confidence>.5 && detectedBounds;

  if(isDetected){
    heartGlowTarget=1; cakeTarget=1;
    const sx=W/detCanvas.width, sy=H/detCanvas.height;
    const tx=(detectedBounds.x+detectedBounds.w/2)*sx;
    const ty=(detectedBounds.y+detectedBounds.h/2)*sy;
    heartCX=heartCX*.88+tx*.12;
    heartCY=heartCY*.88+ty*.12;
    const ts=Math.max(detectedBounds.w,detectedBounds.h)*Math.min(sx,sy)*.5;
    heartSize=heartSize*.88+ts*.12;
    if(!found){
      found=true;
      document.getElementById('found-banner').classList.add('show');
      document.getElementById('scan-hint').classList.add('hidden');
      document.getElementById('status').textContent='🎂 Eran loves Mika! 💕';
      burst(heartCX,heartCY,120);
      ringEffects.push({r:0,alpha:1});
      ringEffects.push({r:0,alpha:.75});
    }
    burstTimer++;
    if(burstTimer%7===0)  burst(heartCX,heartCY,5);
    if(burstTimer%40===0){ burst(heartCX,heartCY,35); ringEffects.push({r:0,alpha:.85}); }
  } else {
    heartGlowTarget=0; cakeTarget=0;
    if(found&&confidence<.2){
      found=false; burstTimer=0;
      document.getElementById('found-banner').classList.remove('show');
      document.getElementById('scan-hint').classList.remove('hidden');
      document.getElementById('status').textContent='🔍 Scanning for heart…';
    }
  }

  heartGlowAlpha = heartGlowAlpha*.9  + heartGlowTarget*.1;
  cakeAlpha      = cakeAlpha*.93      + cakeTarget*.07;
  cakeEntrance   = cakeEntrance*.93   + (cakeTarget>.05 ? 1 : 0)*.07;

  // rings
  ringEffects=ringEffects.filter(r=>r.alpha>.01);
  for(const r of ringEffects){ r.r+=5; r.alpha*=.94; drawRing(heartCX,heartCY,r.r,r.alpha); }

  // heart glow outline around detected position
  if(heartGlowAlpha>.05&&heartSize>10)
    drawGlowHeart(heartCX,heartCY,heartSize*.85,heartGlowAlpha,time);

  // BIG CAKE — always centered on screen, inside the heart area
  if(cakeAlpha>.02){
    const screenCX = W/2;
    const screenCY = H/2 + 30; // slightly below center so candles sit nicely in frame
    // scale so cake fills roughly 70% of screen height
    const desiredH = H * 0.68;
    // total cake height in local coords: sum of tier heights + candle ~46
    const localH = 70+60+50+46;
    const sc = (desiredH / localH) * cakeEntrance;
    // bounce-in entrance
    const bounceScale = sc * (1 + Math.sin(Math.max(0,(cakeEntrance-.5)*Math.PI))*0.08);
    drawBigCake(ctx, screenCX, screenCY, bounceScale, cakeAlpha, time);
  }

  // particles (fly over everything)
  particles=particles.filter(p=>p.life>0);
  for(const p of particles){ p.update(particles); p.draw(ctx); }

  requestAnimationFrame(render);
}

/* ══════════════════════════════════════
   INIT
══════════════════════════════════════ */
function initCanvas(){
  overlayCanvas=document.getElementById('overlay-canvas');
  ctx=overlayCanvas.getContext('2d');
  detCanvas=document.createElement('canvas');
  detCanvas.width=160; detCanvas.height=120;
  detCtx=detCanvas.getContext('2d',{willReadFrequently:true});
  function resize(){ overlayCanvas.width=window.innerWidth; overlayCanvas.height=window.innerHeight; }
  resize(); window.addEventListener('resize',resize);
  heartCX=window.innerWidth/2; heartCY=window.innerHeight/2;
  heartSize=Math.min(window.innerWidth,window.innerHeight)*.2;
}

async function startCamera(){
  document.getElementById('splash').style.display='none';
  document.getElementById('loading').classList.add('show');
  videoEl=document.getElementById('video-el');
  initCanvas();
  try{
    const stream=await navigator.mediaDevices.getUserMedia({
      video:{facingMode:{ideal:'environment'},width:{ideal:1280},height:{ideal:720}},audio:false
    });
    videoEl.srcObject=stream;
    videoEl.onloadedmetadata=()=>{
      videoEl.play();
      document.getElementById('loading').classList.remove('show');
      document.getElementById('status').style.display='block';
      document.getElementById('scan-hint').classList.remove('hidden');
      render();
    };
  }catch(err){
    document.getElementById('loading').innerHTML=`
      <div style="text-align:center;padding:2rem;gap:1.2rem;display:flex;flex-direction:column;align-items:center">
        <div style="font-size:3rem">😕</div>
        <h2 style="color:#ff4466;font-size:1.3rem">Camera blocked</h2>
        <p style="color:#ff8899aa;line-height:1.7;max-width:300px;font-size:.88rem">
          Please allow camera permission.<br><br>
          <strong>iPhone/Safari:</strong> Settings → Safari → Camera → Allow<br>
          <strong>Android/Chrome:</strong> Tap 🔒 in address bar → Camera → Allow<br><br>
          Then reload and tap <em>Start Camera</em>.
        </p>
        <button onclick="location.reload()" style="padding:12px 30px;background:linear-gradient(135deg,#ff2255,#ff6688);border:none;border-radius:25px;color:#fff;font-size:1rem;cursor:pointer">🔄 Reload</button>
        <button onclick="startDemo()" style="padding:10px 25px;background:transparent;border:1px solid #ff446644;border-radius:25px;color:#ff8899;font-size:.9rem;cursor:pointer">✨ Demo Mode</button>
      </div>`;
  }
}

/* ══════════════════════════════════════
   DEMO MODE
══════════════════════════════════════ */
function startDemo(){
  document.getElementById('splash').style.display='none';
  document.getElementById('loading').classList.remove('show');
  document.getElementById('scan-hint').classList.add('hidden');
  document.getElementById('status').style.display='block';
  document.getElementById('status').textContent='🎂 Eran loves Mika! 💕';
  document.getElementById('found-banner').classList.add('show');
  initCanvas();
  heartGlowAlpha=1; heartGlowTarget=1;
  cakeAlpha=1; cakeTarget=1; cakeEntrance=1;
  burst(heartCX,heartCY,140);
  ringEffects.push({r:0,alpha:1});
  let t2=0;
  function demoLoop(){
    time+=.016; t2++;
    const W=overlayCanvas.width, H=overlayCanvas.height;
    ctx.clearRect(0,0,W,H);
    // dark vignette bg
    const g=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)/2);
    g.addColorStop(0,'rgba(20,0,10,.5)'); g.addColorStop(1,'rgba(4,0,4,.92)');
    ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

    // heart glow behind cake
    drawGlowHeart(W/2, H/2, Math.min(W,H)*.42, 0.85, time);

    ringEffects=ringEffects.filter(r=>r.alpha>.01);
    for(const r of ringEffects){ r.r+=5; r.alpha*=.94; drawRing(W/2,H/2,r.r,r.alpha); }

    // big centered cake
    const desiredH = H*0.68;
    const localH = 70+60+50+46;
    const sc = desiredH/localH;
    drawBigCake(ctx, W/2, H/2+30, sc, 1, time);

    if(t2%8===0)  burst(W/2,H/2,6);
    if(t2%50===0){ burst(W/2,H/2,45); ringEffects.push({r:0,alpha:.85}); }

    particles=particles.filter(p=>p.life>0);
    for(const p of particles){ p.update(particles); p.draw(ctx); }
    requestAnimationFrame(demoLoop);
  }
  demoLoop();
}

window.startCamera=startCamera;
window.startDemo=startDemo;
</script>
