class Spark{
  constructor(x,y,vx,vy,col){this.x=x;this.y=y;this.vx=vx;this.vy=vy;this.col=col;this.sz=Math.random()*5+1;this.life=1;this.decay=Math.random()*.018+.006;this.tr=[];}
  update(){this.tr.push({x:this.x,y:this.y});if(this.tr.length>10)this.tr.shift();this.x+=this.vx;this.y+=this.vy;this.vy+=.1;this.vx*=.98;this.life-=this.decay;this.sz*=.98;}
  draw(c){if(this.life<=0)return;for(let i=0;i<this.tr.length;i++){const t=this.tr[i],f=i/this.tr.length;c.save();c.globalAlpha=f*this.life*.4;c.fillStyle=this.col;c.shadowColor=this.col;c.shadowBlur=10;c.beginPath();c.arc(t.x,t.y,this.sz*.6*f,0,Math.PI*2);c.fill();c.restore();}c.save();c.globalAlpha=this.life;c.fillStyle=this.col;c.shadowColor=this.col;c.shadowBlur=16;c.beginPath();c.arc(this.x,this.y,this.sz,0,Math.PI*2);c.fill();c.restore();}
}
class Ember{
  constructor(cx,cy){const a=Math.random()*Math.PI*2,s=Math.random()*11+3;this.x=cx+(Math.random()-.5)*40;this.y=cy+(Math.random()-.5)*40;this.vx=Math.cos(a)*s;this.vy=Math.sin(a)*s-4;const C=['#ff2255','#ff6688','#ffaa33','#ff44cc','#ffffff','#ffdd55','#44ffcc','#ff88aa','#ffcc00'];this.col=C[Math.floor(Math.random()*C.length)];this.sz=Math.random()*7+2;this.life=1;this.decay=Math.random()*.011+.004;this.sc=.1;this.tr=[];}
  update(all){this.tr.push({x:this.x,y:this.y});if(this.tr.length>14)this.tr.shift();this.x+=this.vx;this.y+=this.vy;this.vy+=.07;this.vx*=.97;this.life-=this.decay;this.sz*=.97;if(Math.random()<this.sc&&this.life>.3){const a=Math.random()*Math.PI*2,s=Math.random()*4+1;all.push(new Spark(this.x,this.y,Math.cos(a)*s,Math.sin(a)*s-1.5,this.col));}}
  draw(c){if(this.life<=0)return;for(let i=0;i<this.tr.length;i++){const t=this.tr[i],f=i/this.tr.length;c.save();c.globalAlpha=f*this.life*.55;c.fillStyle=this.col;c.shadowColor=this.col;c.shadowBlur=22;c.beginPath();c.arc(t.x,t.y,this.sz*f,0,Math.PI*2);c.fill();c.restore();}c.save();c.globalAlpha=this.life;c.fillStyle=this.col;c.shadowColor=this.col;c.shadowBlur=28;c.beginPath();c.arc(this.x,this.y,this.sz,0,Math.PI*2);c.fill();c.fillStyle='white';c.shadowBlur=6;c.globalAlpha=this.life*.85;c.beginPath();c.arc(this.x,this.y,this.sz*.4,0,Math.PI*2);c.fill();c.restore();}
}

/* ═══════════════════════════════════════════════════════

function drawBigCake(c,cx,cy,ms,alpha,t){
  if(alpha<0.01)return;
  c.save();c.globalAlpha=alpha;c.translate(cx,cy);c.scale(ms,ms);
  const tiers=[{hw:160,h:70,col:'#e8294e',top:'#f04060'},{hw:115,h:60,col:'#f5416b',top:'#ff5580'},{hw:75,h:50,col:'#ff6688',top:'#ff88aa'}];
  let baseY=0;
  c.save();c.fillStyle='#f5c842';c.shadowColor='#c8a020';c.shadowBlur=14;c.beginPath();c.ellipse(0,10,175,18,0,0,Math.PI*2);c.fill();c.fillStyle='#ffe070';c.beginPath();c.ellipse(0,6,170,14,0,0,Math.PI*2);c.fill();c.restore();
  tiers.forEach((tier,ti)=>{
    const{hw,h,col,top}=tier,by=baseY;
    c.save();c.fillStyle=col;c.shadowColor='#aa0030';c.shadowBlur=8;c.beginPath();c.moveTo(-hw,by);c.lineTo(-hw,by-h+10);c.quadraticCurveTo(-hw,by-h,-hw+10,by-h);c.lineTo(hw-10,by-h);c.quadraticCurveTo(hw,by-h,hw,by-h+10);c.lineTo(hw,by);c.closePath();c.fill();c.restore();
    c.save();c.fillStyle='rgba(255,255,255,0.12)';c.beginPath();c.moveTo(-hw+4,by-8);c.lineTo(-hw+4,by-h+14);c.quadraticCurveTo(-hw+4,by-h+4,-hw+14,by-h+4);c.lineTo(hw-14,by-h+4);c.quadraticCurveTo(hw-4,by-h+4,hw-4,by-h+14);c.lineTo(hw-4,by-8);c.closePath();c.fill();c.restore();
    c.save();c.fillStyle=top;c.strokeStyle='rgba(255,50,80,.5)';c.lineWidth=2;c.beginPath();c.ellipse(0,by-h,hw,hw*0.24,0,0,Math.PI*2);c.fill();c.stroke();c.restore();
    const dn=Math.round(hw/22);c.save();c.fillStyle='#fff';c.shadowColor='#eee';c.shadowBlur=5;
    for(let d=0;d<dn;d++){const dx=-hw+hw*2/(dn-1||1)*d,dh=14+Math.sin(d*2.1+ti*1.3)*8,dw=10+Math.sin(d*1.5)*4;c.beginPath();c.moveTo(dx-dw/2,by-h+4);c.bezierCurveTo(dx-dw/2,by-h+dh,dx+dw/2,by-h+dh,dx+dw/2,by-h+4);c.closePath();c.fill();}
    c.fillStyle='rgba(255,255,255,0.55)';c.beginPath();c.ellipse(0,by-h,hw*.8,hw*0.16,0,0,Math.PI*2);c.fill();c.restore();
    c.save();const sc2=['#ffee44','#44ffcc','#ff44cc','#44aaff','#ff8833'];const sn=Math.round(hw/14);
    for(let d=0;d<sn;d++){const dx=-hw*.88+hw*1.76/(sn-1)*d,dy=by-h*.38-Math.sin(d*1.2+ti)*h*.22;c.fillStyle=sc2[d%sc2.length];c.shadowColor=sc2[d%sc2.length];c.shadowBlur=6;c.save();c.translate(dx,dy);c.rotate(d*.6);c.fillRect(-5,-2,10,4);c.restore();}
    c.restore();baseY-=h;
  });
  const topY=baseY;
  [-54,-36,-18,0,18,36,54].forEach((cx2,i)=>{
    const cBase=topY,cH=28,cc=['#ff3344','#3399ff','#ffcc00','#aa44ff','#44dd88','#ff8833','#ff44aa'];
    c.save();c.fillStyle=cc[i];c.strokeStyle='rgba(0,0,0,0.25)';c.lineWidth=1.5;c.beginPath();c.roundRect(cx2-6,cBase-cH,12,cH,3);c.fill();c.stroke();
    c.fillStyle='rgba(255,255,255,0.4)';for(let s=0;s<4;s++)c.fillRect(cx2-6,cBase-cH+s*7,12,3.5);c.restore();
    const flk=Math.sin(t*9+i*1.7)*2.5,fh=18+flk;
    c.save();c.fillStyle='#ff8800';c.shadowColor='#ffaa00';c.shadowBlur=18;c.beginPath();c.moveTo(cx2,cBase-cH-fh);c.bezierCurveTo(cx2+8,cBase-cH-fh*.5,cx2+5,cBase-cH,cx2,cBase-cH);c.bezierCurveTo(cx2-5,cBase-cH,cx2-8,cBase-cH-fh*.5,cx2,cBase-cH-fh);c.fill();
    c.fillStyle='#ffff88';c.shadowColor='#ffff00';c.shadowBlur=10;c.beginPath();c.moveTo(cx2,cBase-cH-fh*.72);c.bezierCurveTo(cx2+4,cBase-cH-fh*.4,cx2+3,cBase-cH,cx2,cBase-cH);c.bezierCurveTo(cx2-3,cBase-cH,cx2-4,cBase-cH-fh*.4,cx2,cBase-cH-fh*.72);c.fill();c.restore();
  });
  const ty=-tiers[0].h*.5;
  c.save();c.font='bold 32px Georgia,serif';c.textAlign='center';c.textBaseline='middle';
  c.strokeStyle='#880022';c.lineWidth=7;c.lineJoin='round';c.strokeText('Eran loves Mika',0,ty);
  c.shadowColor='#ff2255';c.shadowBlur=22;c.fillStyle='#fff';c.globalAlpha=alpha*(0.9+Math.sin(t*2.5)*.1);c.fillText('Eran loves Mika',0,ty);
  c.shadowBlur=0;c.fillStyle='#ffe0ea';c.globalAlpha=alpha;c.fillText('Eran loves Mika',0,ty);c.restore();
  c.restore();
}

/* ═══════════════════════════════════════════════════════
   DETECTOR
   
   Core insight from analysing the ACTUAL drawing at camera res (240×180):
   - Ink is BLACK (gray < 110), NOT red
   - Middle rows (y=85–120 of 180) show EXACTLY 4 ink clusters per row:
       [outer-left stroke | gap | inner-left stroke | inner-right stroke | gap | outer-right stroke]
   - ~55% of mid-section rows have 4 clusters (vs ~0% for random scenes)
   - Inner width / outer width ≈ 0.30–0.55
   - Gap symmetry: left gap ≈ right gap (diff < 35% of outer width)
   
   We require: 4-cluster-row ratio > 30% in the middle band,
               PLUS size ratio in range [0.20, 0.75],
               PLUS gap symmetry < 0.40
   This combination is essentially unique to two concentric heart outlines.
═══════════════════════════════════════════════════════ */

let showDbg = false;
let dbgInfo = {};
function toggleDbg(){ showDbg=!showDbg; document.getElementById('dbg').textContent=showDbg?'debug OFF':'debug'; }

// Returns array of merged clusters [{lo, hi, mid}]
function getClusters(row, DW, thresh, minGap) {
  const raw = [];
  let inC=false, start=0;
  for(let x=0; x<DW; x++){
    const dark = row[x] < thresh;
    if(dark && !inC){ inC=true; start=x; }
    else if(!dark && inC){ inC=false; raw.push([start, x-1]); }
  }
  if(inC) raw.push([start, DW-1]);
  // merge close clusters
  const merged = [];
  for(const c of raw){
    if(merged.length && c[0]-merged[merged.length-1][1] <= minGap)
      merged[merged.length-1][1] = c[1];
    else merged.push([...c]);
  }
  return merged.map(c=>({ lo:c[0], hi:c[1], mid:(c[0]+c[1])>>1 }));
}

function analyzeFrame(){
  if(!videoEl || videoEl.readyState < 2) return;

  const DW=detCv.width, DH=detCv.height;
  detCtx.drawImage(videoEl, 0, 0, DW, DH);
  const imgData = detCtx.getImageData(0, 0, DW, DH).data;

  // Build grayscale row arrays
  const gray = new Uint8Array(DW*DH);
  for(let i=0; i<DW*DH; i++){
    gray[i] = (imgData[i*4] + imgData[i*4+1] + imgData[i*4+2]) / 3;
  }

  // ── Find ink bounding box ──
  const INK = 115; // threshold — black ink on white/grey paper
  const MINGAP = 4; // min pixel gap between clusters (at 240px wide)

  let inkMinY=DH, inkMaxY=0, inkMinX=DW, inkMaxX=0, inkTotal=0;
  for(let y=0; y<DH; y++){
    for(let x=0; x<DW; x++){
      if(gray[y*DW+x] < INK){
        inkTotal++;
        if(y<inkMinY)inkMinY=y; if(y>inkMaxY)inkMaxY=y;
        if(x<inkMinX)inkMinX=x; if(x>inkMaxX)inkMaxX=x;
      }
    }
  }

  // Need some ink
  if(inkTotal < 40){
    confidence = Math.max(0, confidence - 0.08);
    dbgInfo = {s:'no ink ('+inkTotal+')'};
    return;
  }

  const bboxW = inkMaxX - inkMinX + 1;
  const bboxH = inkMaxY - inkMinY + 1;
  const asp = bboxW / bboxH;

  // Aspect ratio check — hearts are roughly 0.65–1.4 wide-to-tall
  if(asp < 0.45 || asp > 1.6 || bboxW < 20 || bboxH < 20){
    confidence = Math.max(0, confidence - 0.07);
    dbgInfo = {s:`bad bbox asp=${asp.toFixed(2)} ${bboxW}x${bboxH}`};
    return;
  }

  // ── Count 4-cluster rows in middle band of bounding box ──
  // Middle band: y from 25% to 75% of bounding box height
  const bandY0 = inkMinY + Math.floor(bboxH * 0.25);
  const bandY1 = inkMinY + Math.floor(bboxH * 0.75);

  let fourRows=0, totalRows=0;
  let ratioSum=0, ratioN=0;
  let symSum=0, symN=0;

  for(let y=bandY0; y<=bandY1; y++){
    const rowSlice = gray.subarray(y*DW, y*DW+DW);
    const clusters = getClusters(rowSlice, DW, INK, MINGAP);
    totalRows++;

    if(clusters.length === 4){
      fourRows++;
      // Compute inner/outer width ratio
      const outerW = clusters[3].mid - clusters[0].mid;
      const innerW = clusters[2].mid - clusters[1].mid;
      if(outerW > 0){
        ratioSum += innerW / outerW;
        ratioN++;
      }
      // Compute gap symmetry: left gap vs right gap
      const gapLeft  = clusters[1].lo - clusters[0].hi;
      const gapRight = clusters[3].lo - clusters[2].hi;
      const symDiff  = Math.abs(gapLeft - gapRight) / Math.max(outerW, 1);
      symSum += symDiff;
      symN++;
    }
  }

  const fourRatio = totalRows > 0 ? fourRows / totalRows : 0;
  const avgRatio  = ratioN > 0 ? ratioSum / ratioN : 0;
  const avgSym    = symN   > 0 ? symSum   / symN   : 1;

  dbgInfo = {
    s: `4cl:${(fourRatio*100).toFixed(0)}% ratio:${avgRatio.toFixed(2)} sym:${avgSym.toFixed(2)}`,
    fourRatio, avgRatio, avgSym, bboxW, bboxH, asp:asp.toFixed(2)
  };

  // ── DECISION ──
  // From real image analysis:
  //   fourRatio ≈ 0.55–0.68  (we require > 0.28 to be generous)
  //   avgRatio  ≈ 0.30–0.55  (inner heart is 30–55% width of outer)
  //   avgSym    ≈ 0.03–0.11  (very symmetric, require < 0.40)
  //
  // Random scenes almost never have >20% 4-cluster rows simultaneously
  // with a consistent size ratio AND symmetric gaps — all three together.

  const goodFour  = fourRatio > 0.28;
  const goodRatio = avgRatio > 0.18 && avgRatio < 0.80;
  const goodSym   = avgSym < 0.42;

  if(goodFour && goodRatio && goodSym){
    // Score 0..1 from how well each criterion is met
    const fScore = Math.min((fourRatio - 0.28) / 0.30, 1);    // peaks at 58%+
    const rScore = 1 - Math.abs(avgRatio - 0.45) / 0.30;       // peaks at ratio=0.45
    const sScore = Math.max(0, (0.42 - avgSym) / 0.42);        // lower sym = better

    const score = fScore*0.50 + Math.max(0,rScore)*0.30 + sScore*0.20;
    const gain  = 0.07 + score * 0.13;
    confidence  = Math.min(1, confidence + gain);

    // Store detection center
    detectedBounds = {
      x: inkMinX, y: inkMinY, w: bboxW, h: bboxH,
      cx: (inkMinX + inkMaxX) >> 1, cy: (inkMinY + inkMaxY) >> 1
    };
    dbgInfo.s += ` ✓ sc=${score.toFixed(2)} DETECTED`;
  } else {
    confidence = Math.max(0, confidence - 0.09);
    dbgInfo.s += ` ✗ (${goodFour?'':'!4cl '}${goodRatio?'':'!ratio '}${goodSym?'':'!sym'})`;
  }

  // ── DEBUG OVERLAY ──
  if(showDbg){
    const cell=3, ox=6, oy=45;
    // Draw grayscale downsampled image
    for(let y=0;y<DH;y++)
      for(let x=0;x<DW;x++){
        const g=gray[y*DW+x];
        ctx.fillStyle = g<INK ? '#ff4466' : `rgba(${g},${g},${g},0.15)`;
        ctx.fillRect(ox+x*cell, oy+y*cell, cell, cell);
      }
    // Draw bounding box
    ctx.strokeStyle='#ffff00';ctx.lineWidth=2;
    ctx.strokeRect(ox+inkMinX*cell, oy+inkMinY*cell, bboxW*cell, bboxH*cell);
    // Draw band lines
    ctx.strokeStyle='rgba(0,255,0,0.5)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(ox,oy+bandY0*cell);ctx.lineTo(ox+DW*cell,oy+bandY0*cell);ctx.stroke();
    ctx.beginPath();ctx.moveTo(ox,oy+bandY1*cell);ctx.lineTo(ox+DW*cell,oy+bandY1*cell);ctx.stroke();
    // Info box
    ctx.fillStyle='rgba(0,0,0,.8)';ctx.fillRect(ox, oy+DH*cell+3, 320, 70);
    ctx.fillStyle='#fff';ctx.font='11px monospace';
    ctx.fillText(dbgInfo.s, ox+4, oy+DH*cell+17);
    ctx.fillText(`bbox:${bboxW}x${bboxH} asp:${dbgInfo.asp} ink:${inkTotal}`, ox+4, oy+DH*cell+31);
    ctx.fillText(`conf:${confidence.toFixed(3)} rows:${totalRows} 4cl:${fourRows}`, ox+4, oy+DH*cell+45);
  }
}

/* ═══════════════════════════════════════════════════════
   STATE & RENDER
═══════════════════════════════════════════════════════ */
let oc, ctx, videoEl, detCv, detCtx;
let particles=[], ringEffects=[];
let found=false, confidence=0;
let heartCX=0, heartCY=0, heartSize=0;
let heartGlowAlpha=0, heartGlowTarget=0;
let cakeAlpha=0, cakeTarget=0, cakeEntrance=0;
let burstTimer=0, time=0, lastDetect=0;
let detectedBounds=null;

function burst(cx,cy,n){ for(let i=0;i<n;i++) particles.push(new Ember(cx,cy)); }

function heartPath(c,cx,cy,s){
  c.beginPath();
  for(let t=0;t<=Math.PI*2;t+=.04){
    const x=s*16*Math.pow(Math.sin(t),3)/16;
    const y=-s*(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t))/16;
    t<.02?c.moveTo(cx+x,cy+y):c.lineTo(cx+x,cy+y);
  }
  c.closePath();
}
function drawGlowHeart(cx,cy,s,alpha,t){
  const ss=s*(1+Math.sin(t*3)*.06);
  for(let i=4;i>=0;i--){ctx.save();ctx.globalAlpha=alpha*(.12-i*.02);ctx.strokeStyle='#ff2255';ctx.lineWidth=5+i*10;ctx.shadowColor='#ff2255';ctx.shadowBlur=35+i*12;ctx.lineJoin='round';heartPath(ctx,cx,cy,ss);ctx.stroke();ctx.restore();}
  ctx.save();ctx.globalAlpha=alpha;ctx.strokeStyle='#ff6688';ctx.lineWidth=2.5;ctx.shadowColor='#ff99aa';ctx.shadowBlur=18;ctx.lineJoin='round';heartPath(ctx,cx,cy,ss);ctx.stroke();ctx.restore();
}
function drawRing(cx,cy,r,alpha){ctx.save();ctx.globalAlpha=alpha;ctx.strokeStyle='#ff4466';ctx.lineWidth=2.5;ctx.shadowColor='#ff4466';ctx.shadowBlur=22;ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.stroke();ctx.restore();}

function render(){
  time+=.016;
  const W=oc.width, H=oc.height;
  ctx.clearRect(0,0,W,H);

  if(Date.now()-lastDetect > 70){ analyzeFrame(); lastDetect=Date.now(); }

  const isDetected = confidence > 0.50 && detectedBounds;

  // Update live status
  if(!found) document.getElementById('status').textContent = `conf:${confidence.toFixed(2)} — ${dbgInfo.s||'scanning…'}`;

  if(isDetected){
    heartGlowTarget=1; cakeTarget=1;
    // Map detection coords from det canvas to screen
    const sx=W/detCv.width, sy=H/detCv.height;
    const tx=detectedBounds.cx*sx, ty=detectedBounds.cy*sy;
    heartCX=heartCX*.88+tx*.12; heartCY=heartCY*.88+ty*.12;
    const ts=Math.max(detectedBounds.w,detectedBounds.h)*Math.min(sx,sy)*.48;
    heartSize=heartSize*.88+ts*.12;

    if(!found){
      found=true;
      document.getElementById('found-banner').classList.add('show');
      document.getElementById('scan-hint').classList.add('hidden');
      document.getElementById('status').textContent='🎂 Eran loves Mika! 💕';
      burst(heartCX,heartCY,130);
      ringEffects.push({r:0,alpha:1}); ringEffects.push({r:0,alpha:.75});
    }
    burstTimer++;
    if(burstTimer%7===0)  burst(heartCX,heartCY,5);
    if(burstTimer%40===0){ burst(heartCX,heartCY,35); ringEffects.push({r:0,alpha:.85}); }
  } else {
    heartGlowTarget=0; cakeTarget=0;
    if(found && confidence < 0.18){
      found=false; burstTimer=0;
      document.getElementById('found-banner').classList.remove('show');
      document.getElementById('scan-hint').classList.remove('hidden');
    }
  }

  heartGlowAlpha = heartGlowAlpha*.9  + heartGlowTarget*.1;
  cakeAlpha      = cakeAlpha*.93      + cakeTarget*.07;
  cakeEntrance   = cakeEntrance*.93   + (cakeTarget>.05?1:0)*.07;

  ringEffects=ringEffects.filter(r=>r.alpha>.01);
  for(const r of ringEffects){ r.r+=5; r.alpha*=.94; drawRing(heartCX,heartCY,r.r,r.alpha); }

  if(heartGlowAlpha>.05 && heartSize>10) drawGlowHeart(heartCX,heartCY,heartSize*.85,heartGlowAlpha,time);

  if(cakeAlpha>.02){
    const sc=(H*0.68/(70+60+50+46))*cakeEntrance;
    const bs=sc*(1+Math.sin(Math.max(0,(cakeEntrance-.5)*Math.PI))*.08);
    drawBigCake(ctx,W/2,H/2+30,bs,cakeAlpha,time);
  }

  particles=particles.filter(p=>p.life>0);
  for(const p of particles){ p.update(particles); p.draw(ctx); }

  requestAnimationFrame(render);
}

/* ═══════════════════════════════════════════════════════
   INIT & CAMERA
═══════════════════════════════════════════════════════ */
function initCanvas(){
  oc=document.getElementById('oc');
  ctx=oc.getContext('2d');
  detCv=document.createElement('canvas');
  detCv.width=240; detCv.height=180;
  detCtx=detCv.getContext('2d',{willReadFrequently:true});
  function resize(){ oc.width=window.innerWidth; oc.height=window.innerHeight; }
  resize(); window.addEventListener('resize',resize);
  heartCX=window.innerWidth/2; heartCY=window.innerHeight/2;
  heartSize=Math.min(window.innerWidth,window.innerHeight)*.22;
}

async function startCamera(){
  document.getElementById('splash').style.display='none';
  document.getElementById('loading').classList.add('show');
  videoEl=document.getElementById('video-el');
  initCanvas();
  try{
    const stream=await navigator.mediaDevices.getUserMedia({
      video:{facingMode:{ideal:'environment'},width:{ideal:1280},height:{ideal:720}},audio:false
    });
    videoEl.srcObject=stream;
    videoEl.onloadedmetadata=()=>{
      videoEl.play();
      document.getElementById('loading').classList.remove('show');
      document.getElementById('status').style.display='block';
      document.getElementById('scan-hint').classList.remove('hidden');
      document.getElementById('dbg').style.display='block';
      render();
    };
  }catch(err){
    document.getElementById('loading').innerHTML=`
      <div style="text-align:center;padding:2rem;gap:1.2rem;display:flex;flex-direction:column;align-items:center">
        <div style="font-size:3rem">😕</div>
        <h2 style="color:#ff4466">Camera blocked</h2>
        <p style="color:#ff8899aa;line-height:1.7;max-width:300px;font-size:.88rem">
          <strong>iPhone:</strong> Settings → Safari → Camera → Allow<br>
          <strong>Android:</strong> Tap 🔒 in address bar → Camera → Allow<br><br>
          Then reload and tap Start Camera.
        </p>
        <button onclick="location.reload()" style="padding:12px 30px;background:linear-gradient(135deg,#ff2255,#ff6688);border:none;border-radius:25px;color:#fff;font-size:1rem;cursor:pointer">🔄 Reload</button>
        <button onclick="startDemo()" style="padding:10px 25px;background:transparent;border:1px solid #ff446644;border-radius:25px;color:#ff8899;font-size:.9rem;cursor:pointer">✨ Demo Mode</button>
      </div>`;
  }
}

function startDemo(){
  document.getElementById('splash').style.display='none';
  document.getElementById('loading').classList.remove('show');
  document.getElementById('scan-hint').classList.add('hidden');
  document.getElementById('status').style.display='block';
  document.getElementById('status').textContent='🎂 Eran loves Mika! 💕';
  document.getElementById('found-banner').classList.add('show');
  initCanvas();
  heartGlowAlpha=1; heartGlowTarget=1; cakeAlpha=1; cakeTarget=1; cakeEntrance=1;
  burst(heartCX,heartCY,140); ringEffects.push({r:0,alpha:1});
  let t2=0;
  function demoLoop(){
    time+=.016; t2++;
    const W=oc.width, H=oc.height;
    ctx.clearRect(0,0,W,H);
    const g=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)/2);
    g.addColorStop(0,'rgba(20,0,10,.5)'); g.addColorStop(1,'rgba(4,0,4,.92)');
    ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
    drawGlowHeart(W/2,H/2,Math.min(W,H)*.42,0.85,time);
    ringEffects=ringEffects.filter(r=>r.alpha>.01);
    for(const r of ringEffects){ r.r+=5; r.alpha*=.94; drawRing(W/2,H/2,r.r,r.alpha); }
    const sc=(H*0.68)/(70+60+50+46);
    drawBigCake(ctx,W/2,H/2+30,sc,1,time);
    if(t2%8===0)  burst(W/2,H/2,6);
    if(t2%50===0){ burst(W/2,H/2,45); ringEffects.push({r:0,alpha:.85}); }
    particles=particles.filter(p=>p.life>0);
    for(const p of particles){ p.update(particles); p.draw(ctx); }
    requestAnimationFrame(demoLoop);
  }
  demoLoop();
}

window.startCamera=startCamera;
window.startDemo=startDemo;
window.toggleDbg=toggleDbg;
</script>
