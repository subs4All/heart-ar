<script>
/* ═══════════════════════════════════════
   PARTICLES
═══════════════════════════════════════ */
class Spark {
  constructor(x,y,vx,vy,color){
    this.x=x;this.y=y;this.vx=vx;this.vy=vy;this.color=color;
    this.size=Math.random()*5+1;this.life=1;this.decay=Math.random()*.018+.006;this.trail=[];
  }
  update(){
    this.trail.push({x:this.x,y:this.y});
    if(this.trail.length>10)this.trail.shift();
    this.x+=this.vx;this.y+=this.vy;this.vy+=.1;this.vx*=.98;
    this.life-=this.decay;this.size*=.98;
  }
  draw(c){
    if(this.life<=0)return;
    for(let i=0;i<this.trail.length;i++){
      const t=this.trail[i],f=i/this.trail.length;
      c.save();c.globalAlpha=f*this.life*.4;c.fillStyle=this.color;c.shadowColor=this.color;c.shadowBlur=10;
      c.beginPath();c.arc(t.x,t.y,this.size*.6*f,0,Math.PI*2);c.fill();c.restore();
    }
    c.save();c.globalAlpha=this.life;c.fillStyle=this.color;c.shadowColor=this.color;c.shadowBlur=16;
    c.beginPath();c.arc(this.x,this.y,this.size,0,Math.PI*2);c.fill();c.restore();
  }
}
class Ember {
  constructor(cx,cy){
    const a=Math.random()*Math.PI*2,s=Math.random()*11+3;
    this.x=cx+(Math.random()-.5)*40;this.y=cy+(Math.random()-.5)*40;
    this.vx=Math.cos(a)*s;this.vy=Math.sin(a)*s-4;
    const C=['#ff2255','#ff6688','#ffaa33','#ff44cc','#ffffff','#ffdd55','#44ffcc','#ff88aa','#ffcc00'];
    this.color=C[Math.floor(Math.random()*C.length)];
    this.size=Math.random()*7+2;this.life=1;this.decay=Math.random()*.011+.004;this.sparkChance=.1;this.trail=[];
  }
  update(all){
    this.trail.push({x:this.x,y:this.y});
    if(this.trail.length>14)this.trail.shift();
    this.x+=this.vx;this.y+=this.vy;this.vy+=.07;this.vx*=.97;
    this.life-=this.decay;this.size*=.97;
    if(Math.random()<this.sparkChance&&this.life>.3){
      const a2=Math.random()*Math.PI*2,s2=Math.random()*4+1;
      all.push(new Spark(this.x,this.y,Math.cos(a2)*s2,Math.sin(a2)*s2-1.5,this.color));
    }
  }
  draw(c){
    if(this.life<=0)return;
    for(let i=0;i<this.trail.length;i++){
      const t=this.trail[i],f=i/this.trail.length;
      c.save();c.globalAlpha=f*this.life*.55;c.fillStyle=this.color;c.shadowColor=this.color;c.shadowBlur=22;
      c.beginPath();c.arc(t.x,t.y,this.size*f,0,Math.PI*2);c.fill();c.restore();
    }
    c.save();c.globalAlpha=this.life;c.fillStyle=this.color;c.shadowColor=this.color;c.shadowBlur=28;
    c.beginPath();c.arc(this.x,this.y,this.size,0,Math.PI*2);c.fill();
    c.fillStyle='white';c.shadowBlur=6;c.globalAlpha=this.life*.85;
    c.beginPath();c.arc(this.x,this.y,this.size*.4,0,Math.PI*2);c.fill();c.restore();
  }
}

/* ═══════════════════════════════════════
   CAKE
═══════════════════════════════════════ */
function drawBigCake(c,cx,cy,masterScale,alpha,t){
  if(alpha<0.01)return;
  c.save();c.globalAlpha=alpha;c.translate(cx,cy);c.scale(masterScale,masterScale);
  const tiers=[{hw:160,h:70,col:'#e8294e',top:'#f04060'},{hw:115,h:60,col:'#f5416b',top:'#ff5580'},{hw:75,h:50,col:'#ff6688',top:'#ff88aa'}];
  let baseY=0;
  c.save();c.fillStyle='#f5c842';c.shadowColor='#c8a020';c.shadowBlur=14;
  c.beginPath();c.ellipse(0,10,175,18,0,0,Math.PI*2);c.fill();
  c.fillStyle='#ffe070';c.beginPath();c.ellipse(0,6,170,14,0,0,Math.PI*2);c.fill();c.restore();
  tiers.forEach((tier,ti)=>{
    const{hw,h,col,top}=tier,by=baseY;
    c.save();c.fillStyle=col;c.shadowColor='#aa0030';c.shadowBlur=8;
    c.beginPath();c.moveTo(-hw,by);c.lineTo(-hw,by-h+10);c.quadraticCurveTo(-hw,by-h,-hw+10,by-h);
    c.lineTo(hw-10,by-h);c.quadraticCurveTo(hw,by-h,hw,by-h+10);c.lineTo(hw,by);c.closePath();c.fill();c.restore();
    c.save();c.fillStyle='rgba(255,255,255,0.12)';
    c.beginPath();c.moveTo(-hw+4,by-8);c.lineTo(-hw+4,by-h+14);c.quadraticCurveTo(-hw+4,by-h+4,-hw+14,by-h+4);
    c.lineTo(hw-14,by-h+4);c.quadraticCurveTo(hw-4,by-h+4,hw-4,by-h+14);c.lineTo(hw-4,by-8);c.closePath();c.fill();c.restore();
    c.save();c.fillStyle=top;c.strokeStyle='rgba(255,50,80,.5)';c.lineWidth=2;
    c.beginPath();c.ellipse(0,by-h,hw,hw*0.24,0,0,Math.PI*2);c.fill();c.stroke();c.restore();
    const dn=Math.round(hw/22);
    c.save();c.fillStyle='#fff';c.shadowColor='#eee';c.shadowBlur=5;
    for(let d=0;d<dn;d++){
      const dx=-hw+hw*2/(dn-1||1)*d,dh=14+Math.sin(d*2.1+ti*1.3)*8,dw=10+Math.sin(d*1.5)*4;
      c.beginPath();c.moveTo(dx-dw/2,by-h+4);c.bezierCurveTo(dx-dw/2,by-h+dh,dx+dw/2,by-h+dh,dx+dw/2,by-h+4);c.closePath();c.fill();
    }
    c.fillStyle='rgba(255,255,255,0.55)';c.beginPath();c.ellipse(0,by-h,hw*.8,hw*0.16,0,0,Math.PI*2);c.fill();c.restore();
    c.save();const sc2=['#ffee44','#44ffcc','#ff44cc','#44aaff','#ff8833'];const sn=Math.round(hw/14);
    for(let d=0;d<sn;d++){
      const dx=-hw*.88+hw*1.76/(sn-1)*d,dy=by-h*.38-Math.sin(d*1.2+ti)*h*.22;
      c.fillStyle=sc2[d%sc2.length];c.shadowColor=sc2[d%sc2.length];c.shadowBlur=6;
      c.save();c.translate(dx,dy);c.rotate(d*.6);c.fillRect(-5,-2,10,4);c.restore();
    }
    c.restore();
    baseY-=h;
  });
  const topY=baseY;
  const cxs=[-54,-36,-18,0,18,36,54];
  const cc=['#ff3344','#3399ff','#ffcc00','#aa44ff','#44dd88','#ff8833','#ff44aa'];
  cxs.forEach((cx2,i)=>{
    const cBase=topY,cH=28;
    c.save();c.fillStyle=cc[i];c.strokeStyle='rgba(0,0,0,0.25)';c.lineWidth=1.5;
    c.beginPath();c.roundRect(cx2-6,cBase-cH,12,cH,3);c.fill();c.stroke();
    c.fillStyle='rgba(255,255,255,0.4)';for(let s=0;s<4;s++)c.fillRect(cx2-6,cBase-cH+s*7,12,3.5);c.restore();
    const flk=Math.sin(t*9+i*1.7)*2.5,fh=18+flk;
    c.save();c.fillStyle='#ff8800';c.shadowColor='#ffaa00';c.shadowBlur=18;
    c.beginPath();c.moveTo(cx2,cBase-cH-fh);c.bezierCurveTo(cx2+8,cBase-cH-fh*.5,cx2+5,cBase-cH,cx2,cBase-cH);
    c.bezierCurveTo(cx2-5,cBase-cH,cx2-8,cBase-cH-fh*.5,cx2,cBase-cH-fh);c.fill();
    c.fillStyle='#ffff88';c.shadowColor='#ffff00';c.shadowBlur=10;
    c.beginPath();c.moveTo(cx2,cBase-cH-fh*.72);c.bezierCurveTo(cx2+4,cBase-cH-fh*.4,cx2+3,cBase-cH,cx2,cBase-cH);
    c.bezierCurveTo(cx2-3,cBase-cH,cx2-4,cBase-cH-fh*.4,cx2,cBase-cH-fh*.72);c.fill();c.restore();
  });
  const textY=-tiers[0].h*.5;
  c.save();c.font='bold 32px Georgia,serif';c.textAlign='center';c.textBaseline='middle';
  c.strokeStyle='#880022';c.lineWidth=7;c.lineJoin='round';c.strokeText('Eran loves Mika',0,textY);
  c.shadowColor='#ff2255';c.shadowBlur=22;c.fillStyle='#fff';c.globalAlpha=alpha*(0.9+Math.sin(t*2.5)*.1);
  c.fillText('Eran loves Mika',0,textY);c.shadowBlur=0;c.fillStyle='#ffe0ea';c.globalAlpha=alpha;
  c.fillText('Eran loves Mika',0,textY);c.restore();
  c.restore();
}

/* ═══════════════════════════════════════
   DETECTION — balanced approach
   
   Strategy: use TWO signals combined:
   1. COLOR: detect the dark-red/maroon ink pixels
   2. SHAPE: check that the blob has heart-like geometry
   
   Each check is tolerant individually but combined they are precise.
═══════════════════════════════════════ */

let debugMode = false;
let debugInfo = {};

function toggleDebug(){
  debugMode = !debugMode;
  document.getElementById('debugBtn').textContent = debugMode ? '❌ debug off' : '🔍 debug';
}

function detectInk(r, g, b, brightness) {
  // Dark red / maroon (pen drawing color)
  if(r > 50 && r < 210 && g < 80 && b < 90 && r > g + 15 && r > b + 10) return true;
  // Very dark stroke (dark pen on paper)
  if(brightness < 55 && Math.abs(r-g)<25 && Math.abs(r-b)<25) return true;
  // Dark brownish-red
  if(r > 40 && r < 160 && g < 60 && b < 60 && r > g*1.5) return true;
  return false;
}

function analyzeFrame() {
  if(!videoEl || videoEl.readyState < 2) return;

  const DW = detCanvas.width, DH = detCanvas.height;
  detCtx.drawImage(videoEl, 0, 0, DW, DH);
  const data = detCtx.getImageData(0, 0, DW, DH).data;

  // Build ink mask + bounding box
  const mask = new Uint8Array(DW * DH);
  let minX=DW, maxX=0, minY=DH, maxY=0, cnt=0;

  for(let i=0; i<data.length; i+=4){
    const r=data[i], g=data[i+1], b=data[i+2];
    const brightness = (r+g+b)/3;
    if(detectInk(r,g,b,brightness)){
      const px=(i/4)%DW, py=Math.floor((i/4)/DW);
      mask[py*DW+px]=1; cnt++;
      if(px<minX)minX=px; if(px>maxX)maxX=px;
      if(py<minY)minY=py; if(py>maxY)maxY=py;
    }
  }

  // Need a minimum amount of ink
  if(cnt < 60){
    confidence = Math.max(0, confidence - 0.07);
    debugInfo = {cnt, reason:'too few ink pixels'};
    return;
  }

  const bw=maxX-minX+1, bh=maxY-minY+1;

  // Must be a reasonable size on screen
  if(bw < 15 || bh < 15){
    confidence = Math.max(0, confidence - 0.07);
    debugInfo = {cnt, bw, bh, reason:'too small'};
    return;
  }

  // Aspect ratio: hearts are 0.7 to 1.4 wide-to-tall
  const asp = bw / bh;
  if(asp < 0.5 || asp > 1.7){
    confidence = Math.max(0, confidence - 0.08);
    debugInfo = {cnt, asp: asp.toFixed(2), reason:'bad aspect ratio'};
    return;
  }

  // ── Resample to 24×24 grid ──
  const G = 24;
  const grid = [];
  for(let r=0; r<G; r++){
    grid.push(new Uint8Array(G));
    for(let c=0; c<G; c++){
      const x0=minX+Math.floor(c*bw/G), y0=minY+Math.floor(r*bh/G);
      const x1=minX+Math.floor((c+1)*bw/G), y1=minY+Math.floor((r+1)*bh/G);
      let s=0, n=0;
      for(let py=y0; py<=Math.min(y1,DH-1); py++)
        for(let px=x0; px<=Math.min(x1,DW-1); px++){ s+=mask[py*DW+px]; n++; }
      grid[r][c] = (n>0 && s/n > 0.12) ? 1 : 0;
    }
  }

  // ── TEST 1: LEFT-RIGHT SYMMETRY ──
  // Hearts are approximately symmetric. Score how mirrored it is.
  let symHits=0, symTotal=0;
  for(let r=0; r<G; r++)
    for(let c=0; c<Math.floor(G/2); c++){
      symTotal++;
      if(grid[r][c] === grid[r][G-1-c]) symHits++;
    }
  const symmetry = symHits/symTotal; // 0..1, expect > 0.58 for hearts

  // ── TEST 2: TOP HALF WIDER THAN BOTTOM HALF ──
  // Compute average row-span in top half vs bottom half
  let topSpanSum=0, topSpanN=0, botSpanSum=0, botSpanN=0;
  for(let r=0; r<G; r++){
    let lo=G, hi=-1;
    for(let c=0; c<G; c++) if(grid[r][c]){ if(c<lo)lo=c; if(c>hi)hi=c; }
    const span = hi>=lo ? hi-lo+1 : 0;
    if(r < G/2){ topSpanSum+=span; topSpanN++; }
    else        { botSpanSum+=span; botSpanN++; }
  }
  const avgTop = topSpanN>0 ? topSpanSum/topSpanN : 0;
  const avgBot = botSpanN>0 ? botSpanSum/botSpanN : 0;
  // Taper ratio: bottom/top — should be < 0.72 for a heart
  const taper = avgTop>2 ? avgBot/avgTop : 1;

  // ── TEST 3: CLEFT DIP at top-center ──
  // At ~15-25% down, look for a valley in the middle
  let cleftScore = 0;
  for(let r=Math.floor(G*0.12); r<Math.floor(G*0.30); r++){
    const midC = Math.floor(G/2);
    const leftFilled  = grid[r][midC-2] || grid[r][midC-3] || grid[r][midC-4];
    const rightFilled = grid[r][midC+2] || grid[r][midC+3] || grid[r][midC+4];
    const centerEmpty = !grid[r][midC] && !grid[r][midC-1] && !grid[r][midC+1];
    if(leftFilled && rightFilled && centerEmpty) cleftScore++;
  }
  // cleftScore: how many rows in top section have the cleft pattern (max ~4)
  const cleftNorm = Math.min(cleftScore / 2, 1); // 0..1

  // ── TEST 4: BOTTOM ROWS CONVERGE (V-point) ──
  // The last few rows should have very few pixels (narrowing to point)
  let bottomRows = [];
  for(let r=Math.floor(G*0.75); r<G; r++){
    let s=0; for(let c=0; c<G; c++) s+=grid[r][c];
    bottomRows.push(s);
  }
  // Should narrow — last row narrower than first of these rows
  const bottomNarrowing = bottomRows.length>1 && bottomRows[bottomRows.length-1] <= bottomRows[0];
  const bottomTip = bottomRows[bottomRows.length-1] <= 4; // very few pixels at tip

  // ── WEIGHTED SCORE ──
  const symScore    = Math.max(0, (symmetry - 0.50) / 0.35);     // 0..1 (passes at >0.50)
  const taperScore  = Math.max(0, (0.72 - taper)   / 0.52);     // 0..1 (passes at <0.72)
  const tipScore    = (bottomNarrowing ? 0.5 : 0) + (bottomTip ? 0.5 : 0); // 0..1

  // Cleft is a strong signal but optional (some drawings don't have obvious cleft)
  const score = symScore*0.40 + taperScore*0.35 + cleftNorm*0.15 + tipScore*0.10;

  debugInfo = {
    cnt, asp:asp.toFixed(2),
    sym:symmetry.toFixed(2), taper:taper.toFixed(2),
    cleft:cleftScore, tip:bottomTip?1:0,
    score:score.toFixed(2)
  };

  // ── UPDATE CONFIDENCE ──
  // Score > 0.30 = plausible heart → ramp up
  // Score < 0.15 = definitely not → ramp down fast
  if(score > 0.30){
    const gain = 0.05 + score * 0.10; // 0.05..0.15 per frame
    confidence = Math.min(1, confidence + gain);
    detectedBounds = {x:minX, y:minY, w:bw, h:bh};
  } else if(score > 0.15){
    // ambiguous — hold steady
    confidence = Math.max(0, confidence - 0.02);
  } else {
    confidence = Math.max(0, confidence - 0.10);
  }

  // ── DEBUG RENDER ──
  if(debugMode){
    // Draw grid
    const cell=7, ox=10, oy=55;
    for(let r=0; r<G; r++)
      for(let c=0; c<G; c++){
        ctx.fillStyle = grid[r][c] ? '#ff4466' : 'rgba(255,255,255,0.04)';
        ctx.fillRect(ox+c*cell, oy+r*cell, cell-1, cell-1);
      }
    // Highlight cleft row range
    ctx.strokeStyle='rgba(255,220,0,0.4)';ctx.lineWidth=1;
    ctx.strokeRect(ox, oy+Math.floor(G*0.12)*cell, G*cell, (Math.floor(G*0.30)-Math.floor(G*0.12))*cell);

    const info = debugInfo;
    ctx.fillStyle='rgba(0,0,0,0.7)';
    ctx.fillRect(ox, oy+G*cell+4, 200, 80);
    ctx.fillStyle='#fff';ctx.font='11px monospace';
    const lines=[
      `ink:${info.cnt} asp:${info.asp}`,
      `sym:${info.sym} taper:${info.taper}`,
      `cleft:${info.cleft} tip:${info.tip}`,
      `score:${info.score}  conf:${confidence.toFixed(2)}`,
      info.reason||''
    ];
    lines.forEach((l,i)=> ctx.fillText(l, ox+4, oy+G*cell+18+i*13));
  }
}

/* ═══════════════════════════════════════
   STATE
═══════════════════════════════════════ */
let overlayCanvas, ctx, videoEl;
let detCanvas, detCtx;
let particles=[], ringEffects=[];
let found=false, confidence=0;
let heartCX=0, heartCY=0, heartSize=100;
let heartGlowAlpha=0, heartGlowTarget=0;
let cakeAlpha=0, cakeTarget=0, cakeEntrance=0;
let burstTimer=0, time=0, lastDetect=0;
let detectedBounds=null;

function burst(cx,cy,n){ for(let i=0;i<n;i++) particles.push(new Ember(cx,cy)); }

function heartPath(c,cx,cy,s){
  c.beginPath();
  for(let t=0;t<=Math.PI*2;t+=.04){
    const x=s*16*Math.pow(Math.sin(t),3)/16;
    const y=-s*(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t))/16;
    t<.02?c.moveTo(cx+x,cy+y):c.lineTo(cx+x,cy+y);
  }
  c.closePath();
}
function drawGlowHeart(cx,cy,s,alpha,t){
  const ss=s*(1+Math.sin(t*3)*.06);
  for(let i=4;i>=0;i--){
    ctx.save();ctx.globalAlpha=alpha*(.12-i*.02);ctx.strokeStyle='#ff2255';ctx.lineWidth=5+i*10;
    ctx.shadowColor='#ff2255';ctx.shadowBlur=35+i*12;ctx.lineJoin='round';heartPath(ctx,cx,cy,ss);ctx.stroke();ctx.restore();
  }
  ctx.save();ctx.globalAlpha=alpha;ctx.strokeStyle='#ff6688';ctx.lineWidth=2.5;
  ctx.shadowColor='#ff99aa';ctx.shadowBlur=18;ctx.lineJoin='round';heartPath(ctx,cx,cy,ss);ctx.stroke();ctx.restore();
}
function drawRing(cx,cy,r,alpha){
  ctx.save();ctx.globalAlpha=alpha;ctx.strokeStyle='#ff4466';ctx.lineWidth=2.5;
  ctx.shadowColor='#ff4466';ctx.shadowBlur=22;ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.stroke();ctx.restore();
}

/* ═══════════════════════════════════════
   RENDER
═══════════════════════════════════════ */
function render(){
  time+=.016;
  const W=overlayCanvas.width, H=overlayCanvas.height;
  ctx.clearRect(0,0,W,H);

  if(Date.now()-lastDetect > 70){ analyzeFrame(); lastDetect=Date.now(); }

  const isDetected = confidence > 0.55 && detectedBounds;

  if(isDetected){
    heartGlowTarget=1; cakeTarget=1;
    const sx=W/detCanvas.width, sy=H/detCanvas.height;
    const tx=(detectedBounds.x+detectedBounds.w/2)*sx;
    const ty=(detectedBounds.y+detectedBounds.h/2)*sy;
    heartCX=heartCX*.88+tx*.12; heartCY=heartCY*.88+ty*.12;
    const ts=Math.max(detectedBounds.w,detectedBounds.h)*Math.min(sx,sy)*.5;
    heartSize=heartSize*.88+ts*.12;
    if(!found){
      found=true;
      document.getElementById('found-banner').classList.add('show');
      document.getElementById('scan-hint').classList.add('hidden');
      document.getElementById('status').textContent='🎂 Eran loves Mika! 💕';
      burst(heartCX,heartCY,120);
      ringEffects.push({r:0,alpha:1}); ringEffects.push({r:0,alpha:.75});
    }
    burstTimer++;
    if(burstTimer%7===0)  burst(heartCX,heartCY,5);
    if(burstTimer%40===0){ burst(heartCX,heartCY,35); ringEffects.push({r:0,alpha:.85}); }
  } else {
    heartGlowTarget=0; cakeTarget=0;
    if(found && confidence < 0.20){
      found=false; burstTimer=0;
      document.getElementById('found-banner').classList.remove('show');
      document.getElementById('scan-hint').classList.remove('hidden');
      document.getElementById('status').textContent='🔍 Scanning for heart…';
    }
  }

  // Update status with live score when not found
  if(!found && debugInfo.score){
    document.getElementById('status').textContent =
      `🔍 score:${debugInfo.score} conf:${confidence.toFixed(2)} — ${debugInfo.reason||'analyzing…'}`;
  }

  heartGlowAlpha = heartGlowAlpha*.9  + heartGlowTarget*.1;
  cakeAlpha      = cakeAlpha*.93      + cakeTarget*.07;
  cakeEntrance   = cakeEntrance*.93   + (cakeTarget>.05?1:0)*.07;

  ringEffects=ringEffects.filter(r=>r.alpha>.01);
  for(const r of ringEffects){ r.r+=5; r.alpha*=.94; drawRing(heartCX,heartCY,r.r,r.alpha); }

  if(heartGlowAlpha>.05&&heartSize>10) drawGlowHeart(heartCX,heartCY,heartSize*.85,heartGlowAlpha,time);

  if(cakeAlpha>.02){
    const screenCX=W/2, screenCY=H/2+30;
    const desiredH=H*0.68, localH=70+60+50+46;
    const sc=(desiredH/localH)*cakeEntrance;
    const bs=sc*(1+Math.sin(Math.max(0,(cakeEntrance-.5)*Math.PI))*.08);
    drawBigCake(ctx,screenCX,screenCY,bs,cakeAlpha,time);
  }

  particles=particles.filter(p=>p.life>0);
  for(const p of particles){ p.update(particles); p.draw(ctx); }

  requestAnimationFrame(render);
}

/* ═══════════════════════════════════════
   INIT
═══════════════════════════════════════ */
function initCanvas(){
  overlayCanvas=document.getElementById('overlay-canvas');
  ctx=overlayCanvas.getContext('2d');
  detCanvas=document.createElement('canvas');
  detCanvas.width=240; detCanvas.height=180;
  detCtx=detCanvas.getContext('2d',{willReadFrequently:true});
  function resize(){ overlayCanvas.width=window.innerWidth; overlayCanvas.height=window.innerHeight; }
  resize(); window.addEventListener('resize',resize);
  heartCX=window.innerWidth/2; heartCY=window.innerHeight/2;
  heartSize=Math.min(window.innerWidth,window.innerHeight)*.2;
}

async function startCamera(){
  document.getElementById('splash').style.display='none';
  document.getElementById('loading').classList.add('show');
  videoEl=document.getElementById('video-el');
  initCanvas();
  try{
    const stream=await navigator.mediaDevices.getUserMedia({
      video:{facingMode:{ideal:'environment'},width:{ideal:1280},height:{ideal:720}},audio:false
    });
    videoEl.srcObject=stream;
    videoEl.onloadedmetadata=()=>{
      videoEl.play();
      document.getElementById('loading').classList.remove('show');
      document.getElementById('status').style.display='block';
      document.getElementById('scan-hint').classList.remove('hidden');
      document.getElementById('debugBtn').style.display='block';
      render();
    };
  }catch(err){
    document.getElementById('loading').innerHTML=`
      <div style="text-align:center;padding:2rem;gap:1.2rem;display:flex;flex-direction:column;align-items:center">
        <div style="font-size:3rem">😕</div>
        <h2 style="color:#ff4466;font-size:1.3rem">Camera blocked</h2>
        <p style="color:#ff8899aa;line-height:1.7;max-width:300px;font-size:.88rem">
          <strong>iPhone/Safari:</strong> Settings → Safari → Camera → Allow<br>
          <strong>Android/Chrome:</strong> Tap 🔒 in address bar → Camera → Allow<br><br>
          Then reload and tap <em>Start Camera</em>.
        </p>
        <button onclick="location.reload()" style="padding:12px 30px;background:linear-gradient(135deg,#ff2255,#ff6688);border:none;border-radius:25px;color:#fff;font-size:1rem;cursor:pointer">🔄 Reload</button>
        <button onclick="startDemo()" style="padding:10px 25px;background:transparent;border:1px solid #ff446644;border-radius:25px;color:#ff8899;font-size:.9rem;cursor:pointer">✨ Demo Mode</button>
      </div>`;
  }
}

function startDemo(){
  document.getElementById('splash').style.display='none';
  document.getElementById('loading').classList.remove('show');
  document.getElementById('scan-hint').classList.add('hidden');
  document.getElementById('status').style.display='block';
  document.getElementById('status').textContent='🎂 Eran loves Mika! 💕';
  document.getElementById('found-banner').classList.add('show');
  initCanvas();
  heartGlowAlpha=1; heartGlowTarget=1; cakeAlpha=1; cakeTarget=1; cakeEntrance=1;
  burst(heartCX,heartCY,140); ringEffects.push({r:0,alpha:1});
  let t2=0;
  function demoLoop(){
    time+=.016; t2++;
    const W=overlayCanvas.width, H=overlayCanvas.height;
    ctx.clearRect(0,0,W,H);
    const g=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)/2);
    g.addColorStop(0,'rgba(20,0,10,.5)');g.addColorStop(1,'rgba(4,0,4,.92)');
    ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
    drawGlowHeart(W/2,H/2,Math.min(W,H)*.42,0.85,time);
    ringEffects=ringEffects.filter(r=>r.alpha>.01);
    for(const r of ringEffects){r.r+=5;r.alpha*=.94;drawRing(W/2,H/2,r.r,r.alpha);}
    const dH=H*0.68,lH=70+60+50+46,sc=dH/lH;
    drawBigCake(ctx,W/2,H/2+30,sc,1,time);
    if(t2%8===0)burst(W/2,H/2,6);
    if(t2%50===0){burst(W/2,H/2,45);ringEffects.push({r:0,alpha:.85});}
    particles=particles.filter(p=>p.life>0);
    for(const p of particles){p.update(particles);p.draw(ctx);}
    requestAnimationFrame(demoLoop);
  }
  demoLoop();
}

window.startCamera=startCamera;
window.startDemo=startDemo;
window.toggleDebug=toggleDebug;
</script>
