<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>💕 Heart AR Sparks</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0006;
      font-family: 'Georgia', serif;
      overflow: hidden;
      touch-action: none;
    }

    /* ── SPLASH SCREEN ── */
    #splash {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: radial-gradient(ellipse at center, #1a0010 0%, #0a0006 70%);
      z-index: 2000;
      gap: 1.2rem;
    }
    #splash .heart {
      font-size: 5rem;
      animation: heartbeat 1s ease-in-out infinite;
      filter: drop-shadow(0 0 20px #ff4466);
    }
    @keyframes heartbeat {
      0%,100% { transform: scale(1); }
      50%      { transform: scale(1.2); }
    }
    #splash h1 {
      color: #ff4466;
      font-size: 2rem;
      letter-spacing: .15em;
      text-shadow: 0 0 30px #ff446688;
    }
    #splash p {
      color: #ff8899aa;
      font-size: .9rem;
      text-align: center;
      padding: 0 2.5rem;
      line-height: 1.6;
      max-width: 340px;
    }
    #startBtn {
      margin-top: .5rem;
      padding: 16px 44px;
      background: linear-gradient(135deg, #ff2255, #ff6688);
      border: none; border-radius: 50px;
      color: #fff; font-size: 1.1rem;
      letter-spacing: .08em;
      cursor: pointer;
      box-shadow: 0 0 30px #ff446666, 0 0 60px #ff446622;
      animation: glow 2s ease-in-out infinite;
      transition: transform .15s;
    }
    #startBtn:active { transform: scale(.95); }
    @keyframes glow {
      0%,100% { box-shadow: 0 0 30px #ff446666, 0 0 60px #ff446622; }
      50%      { box-shadow: 0 0 50px #ff4466aa, 0 0 90px #ff446644; }
    }
    #demoBtn {
      background: transparent;
      border: 1px solid #ff446644;
      border-radius: 50px;
      color: #ff8899;
      font-size: .85rem;
      padding: 10px 28px;
      cursor: pointer;
      letter-spacing: .05em;
    }

    /* ── LOADING (after tap) ── */
    #loading {
      position: fixed; inset: 0;
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      background: #0a0006; z-index: 1500;
      color: #ff4466; gap: 1rem;
    }
    #loading.show { display: flex; }
    #loading .lheart { font-size:3rem; animation:heartbeat 1s ease-in-out infinite; }
    #loading h2 { font-size:1.4rem; letter-spacing:.1em; }
    #loading span { color:#ff8899aa; font-size:.9rem; text-align:center; padding:0 2rem; }

    /* ── AR LAYER ── */
    #video-el {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
    }
    #overlay-canvas {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 100;
    }

    /* ── HUD ── */
    #scan-hint {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none; z-index: 200;
      transition: opacity .8s;
    }
    #scan-hint.hidden { opacity: 0; pointer-events:none; }
    .scan-frame {
      width: 200px; height: 200px;
      border: 2px solid #ff446666;
      border-radius: 8px; position:relative;
      animation: scanPulse 2s ease-in-out infinite;
    }
    @keyframes scanPulse {
      0%,100% { border-color:#ff446666; box-shadow:0 0 20px #ff446615; }
      50%      { border-color:#ff4466bb; box-shadow:0 0 40px #ff446630; }
    }
    .scan-frame::before, .scan-frame::after {
      content:''; position:absolute;
      width:28px; height:28px;
      border-color:#ff4466; border-style:solid;
    }
    .scan-frame::before { top:-2px; left:-2px; border-width:3px 0 0 3px; }
    .scan-frame::after  { bottom:-2px; right:-2px; border-width:0 3px 3px 0; }
    .scan-label {
      text-align:center; color:#ff8899aa;
      font-size:.75rem; margin-top:10px;
      letter-spacing:.12em;
    }
    #status {
      position:fixed; bottom:24px; left:50%;
      transform:translateX(-50%);
      background:rgba(255,68,102,.12);
      border:1px solid #ff446633;
      color:#ff8899; padding:10px 22px;
      border-radius:20px; font-size:.82rem;
      z-index:500; backdrop-filter:blur(10px);
      pointer-events:none; white-space:nowrap;
      display:none;
    }
    #found-banner {
      position:fixed; top:32px; left:50%;
      transform:translateX(-50%);
      color:#ff4466; font-size:1.1rem;
      letter-spacing:.2em; z-index:300;
      opacity:0; transition:opacity .5s;
      text-shadow:0 0 20px #ff4466;
      pointer-events:none;
    }
    #found-banner.show { opacity:1; }
  </style>
</head>
<body>

<!-- SPLASH — user must tap to trigger camera permission -->
<div id="splash">
  <div class="heart">💕</div>
  <h1>Heart AR</h1>
  <p>Tap <strong>Start Camera</strong> — your browser will ask for camera access. Then point at the heart drawing to see sparks!</p>
  <button id="startBtn" onclick="startCamera()">✨ Start Camera</button>
  <button id="demoBtn"  onclick="startDemo()">Try Demo (no camera)</button>
</div>

<!-- LOADING shown after tap while permission dialog / stream loads -->
<div id="loading">
  <div class="lheart">💕</div>
  <h2>Opening camera…</h2>
  <span>When your browser asks, tap <strong>Allow</strong> to enable the camera</span>
</div>

<video id="video-el" autoplay playsinline muted></video>
<canvas id="overlay-canvas"></canvas>

<div id="scan-hint" class="hidden">
  <div class="scan-frame"></div>
  <div class="scan-label">AIM AT HEART DRAWING</div>
</div>
<div id="found-banner">✨ HEART DETECTED ✨<br>LOVE YOU MIKA (Eran)</br></div></div>
<div id="status">🔍 Scanning for heart…</div>

<script>
/* ─── PARTICLE CLASSES ─── */
class Spark {
  constructor(x,y,vx,vy,color){
    this.x=x;this.y=y;this.vx=vx;this.vy=vy;this.color=color;
    this.size=Math.random()*4+1;this.life=1;
    this.decay=Math.random()*.022+.008;this.trail=[];
  }
  update(){
    this.trail.push({x:this.x,y:this.y});
    if(this.trail.length>8)this.trail.shift();
    this.x+=this.vx;this.y+=this.vy;
    this.vy+=.12;this.vx*=.98;
    this.life-=this.decay;this.size*=.98;
  }
  draw(ctx){
    if(this.life<=0)return;
    for(let i=0;i<this.trail.length;i++){
      const t=this.trail[i],f=i/this.trail.length;
      ctx.save();ctx.globalAlpha=f*this.life*.35;
      ctx.fillStyle=this.color;ctx.shadowColor=this.color;ctx.shadowBlur=8;
      ctx.beginPath();ctx.arc(t.x,t.y,this.size*.5*f,0,Math.PI*2);ctx.fill();ctx.restore();
    }
    ctx.save();ctx.globalAlpha=this.life;
    ctx.fillStyle=this.color;ctx.shadowColor=this.color;ctx.shadowBlur=14;
    ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fill();ctx.restore();
  }
}

class Ember {
  constructor(cx,cy){
    const a=Math.random()*Math.PI*2,s=Math.random()*9+2;
    this.x=cx+(Math.random()-.5)*30;this.y=cy+(Math.random()-.5)*30;
    this.vx=Math.cos(a)*s;this.vy=Math.sin(a)*s-3;
    const C=['#ff2255','#ff6688','#ffaa33','#ff44cc','#ffffff','#ffdd55'];
    this.color=C[Math.floor(Math.random()*C.length)];
    this.size=Math.random()*6+2;this.life=1;
    this.decay=Math.random()*.013+.005;this.sparkChance=.09;this.trail=[];
  }
  update(all){
    this.trail.push({x:this.x,y:this.y});
    if(this.trail.length>12)this.trail.shift();
    this.x+=this.vx;this.y+=this.vy;
    this.vy+=.08;this.vx*=.97;
    this.life-=this.decay;this.size*=.97;
    if(Math.random()<this.sparkChance&&this.life>.3){
      const a2=Math.random()*Math.PI*2,s2=Math.random()*3+1;
      all.push(new Spark(this.x,this.y,Math.cos(a2)*s2,Math.sin(a2)*s2-1,this.color));
    }
  }
  draw(ctx){
    if(this.life<=0)return;
    for(let i=0;i<this.trail.length;i++){
      const t=this.trail[i],f=i/this.trail.length;
      ctx.save();ctx.globalAlpha=f*this.life*.5;
      ctx.fillStyle=this.color;ctx.shadowColor=this.color;ctx.shadowBlur=20;
      ctx.beginPath();ctx.arc(t.x,t.y,this.size*f,0,Math.PI*2);ctx.fill();ctx.restore();
    }
    ctx.save();ctx.globalAlpha=this.life;
    ctx.fillStyle=this.color;ctx.shadowColor=this.color;ctx.shadowBlur=25;
    ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='white';ctx.shadowBlur=5;ctx.globalAlpha=this.life*.8;
    ctx.beginPath();ctx.arc(this.x,this.y,this.size*.4,0,Math.PI*2);ctx.fill();ctx.restore();
  }
}

/* ─── STATE ─── */
let overlayCanvas,ctx,videoEl;
let detCanvas,detCtx;
let particles=[],ringEffects=[];
let found=false,confidence=0;
let heartCX=0,heartCY=0,heartSize=100;
let heartGlowAlpha=0,heartGlowTarget=0;
let burstTimer=0,time=0,lastDetect=0;
let detectedBounds=null;

/* ─── DRAWING ─── */
function burst(cx,cy,n){for(let i=0;i<n;i++)particles.push(new Ember(cx,cy));}

function heartPath(ctx,cx,cy,s){
  ctx.beginPath();
  for(let t=0;t<=Math.PI*2;t+=.05){
    const x=s*16*Math.pow(Math.sin(t),3)/16;
    const y=-s*(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t))/16;
    t<.01?ctx.moveTo(cx+x,cy+y):ctx.lineTo(cx+x,cy+y);
  }
  ctx.closePath();
}

function drawGlowHeart(cx,cy,s,alpha,t){
  const ss=s*(1+Math.sin(t*3)*.05);
  for(let i=3;i>=0;i--){
    ctx.save();ctx.globalAlpha=alpha*(.14-i*.03);
    ctx.strokeStyle='#ff2255';ctx.lineWidth=4+i*8;
    ctx.shadowColor='#ff2255';ctx.shadowBlur=30+i*10;
    ctx.lineJoin='round';heartPath(ctx,cx,cy,ss);ctx.stroke();ctx.restore();
  }
  ctx.save();ctx.globalAlpha=alpha;
  ctx.strokeStyle='#ff6688';ctx.lineWidth=2;
  ctx.shadowColor='#ff99aa';ctx.shadowBlur=15;
  ctx.lineJoin='round';heartPath(ctx,cx,cy,ss);ctx.stroke();ctx.restore();
}

function drawRing(cx,cy,r,alpha){
  ctx.save();ctx.globalAlpha=alpha;
  ctx.strokeStyle='#ff4466';ctx.lineWidth=2;
  ctx.shadowColor='#ff4466';ctx.shadowBlur=20;
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.stroke();ctx.restore();
}

/* ─── DETECTION ─── */
function analyzeFrame(){
  if(!videoEl||videoEl.readyState<2)return;
  detCtx.drawImage(videoEl,0,0,detCanvas.width,detCanvas.height);
  const d=detCtx.getImageData(0,0,detCanvas.width,detCanvas.height).data;
  const w=detCanvas.width,h=detCanvas.height;
  let cnt=0,minX=w,maxX=0,minY=h,maxY=0;
  for(let i=0;i<d.length;i+=4){
    const r=d[i],g=d[i+1],b=d[i+2];
    if((r>80&&g<70&&b<70&&r>g*1.8&&r>b*1.8)||(r>55&&g<38&&b<38&&r>g+18)){
      cnt++;
      const px=(i/4)%w,py=Math.floor((i/4)/w);
      if(px<minX)minX=px;if(px>maxX)maxX=px;
      if(py<minY)minY=py;if(py>maxY)maxY=py;
    }
  }
  if(cnt<60){confidence=Math.max(0,confidence-.06);return;}
  const bw=maxX-minX,bh=maxY-minY,asp=bw/(bh||1),den=cnt/(bw*bh||1);
  if(asp>.4&&asp<2.2&&den>.004&&den<.45&&bw>25&&bh>25){
    confidence=Math.min(1,confidence+.09);
    detectedBounds={x:minX,y:minY,w:bw,h:bh};
  } else {
    confidence=Math.max(0,confidence-.1);
  }
}

/* ─── RENDER ─── */
function render(){
  time+=.016;
  const W=overlayCanvas.width,H=overlayCanvas.height;
  ctx.clearRect(0,0,W,H);
  if(Date.now()-lastDetect>80){analyzeFrame();lastDetect=Date.now();}

  const isDetected=confidence>.5&&detectedBounds;
  if(isDetected){
    heartGlowTarget=1;
    const sx=W/detCanvas.width,sy=H/detCanvas.height;
    const tx=(detectedBounds.x+detectedBounds.w/2)*sx;
    const ty=(detectedBounds.y+detectedBounds.h/2)*sy;
    heartCX=heartCX*.88+tx*.12;heartCY=heartCY*.88+ty*.12;
    const ts=Math.max(detectedBounds.w,detectedBounds.h)*Math.min(sx,sy)*.5;
    heartSize=heartSize*.88+ts*.12;
    if(!found){
      found=true;
      document.getElementById('found-banner').classList.add('show');
      document.getElementById('scan-hint').classList.add('hidden');
      document.getElementById('status').textContent='💕 Heart detected!';
      burst(heartCX,heartCY,90);
      ringEffects.push({r:0,alpha:1});ringEffects.push({r:0,alpha:.7});
    }
    burstTimer++;
    if(burstTimer%8===0)burst(heartCX,heartCY,4);
    if(burstTimer%45===0){burst(heartCX,heartCY,28);ringEffects.push({r:0,alpha:.8});}
  } else {
    heartGlowTarget=0;
    if(found&&confidence<.2){
      found=false;burstTimer=0;
      document.getElementById('found-banner').classList.remove('show');
      document.getElementById('scan-hint').classList.remove('hidden');
      document.getElementById('status').textContent='🔍 Scanning for heart…';
    }
  }
  heartGlowAlpha=heartGlowAlpha*.9+heartGlowTarget*.1;
  ringEffects=ringEffects.filter(r=>r.alpha>.01);
  for(const r of ringEffects){r.r+=4;r.alpha*=.95;drawRing(heartCX,heartCY,r.r,r.alpha);}
  if(heartGlowAlpha>.05&&heartSize>10)drawGlowHeart(heartCX,heartCY,heartSize*.85,heartGlowAlpha,time);
  particles=particles.filter(p=>p.life>0);
  for(const p of particles){p.update(particles);p.draw(ctx);}
  requestAnimationFrame(render);
}

/* ─── INIT CANVAS ─── */
function initCanvas(){
  overlayCanvas=document.getElementById('overlay-canvas');
  ctx=overlayCanvas.getContext('2d');
  detCanvas=document.createElement('canvas');
  detCanvas.width=160;detCanvas.height=120;
  detCtx=detCanvas.getContext('2d',{willReadFrequently:true});
  function resize(){overlayCanvas.width=window.innerWidth;overlayCanvas.height=window.innerHeight;}
  resize();window.addEventListener('resize',resize);
  heartCX=window.innerWidth/2;heartCY=window.innerHeight/2;
  heartSize=Math.min(window.innerWidth,window.innerHeight)*.2;
}

/* ─── START CAMERA (triggered by user tap = permission prompt fires) ─── */
async function startCamera(){
  // Hide splash, show loading immediately so user sees feedback
  document.getElementById('splash').style.display='none';
  document.getElementById('loading').classList.add('show');

  videoEl=document.getElementById('video-el');
  initCanvas();

  try {
    const stream=await navigator.mediaDevices.getUserMedia({
      video:{facingMode:{ideal:'environment'},width:{ideal:1280},height:{ideal:720}},
      audio:false
    });
    videoEl.srcObject=stream;
    videoEl.onloadedmetadata=()=>{
      videoEl.play();
      document.getElementById('loading').classList.remove('show');
      document.getElementById('status').style.display='block';
      document.getElementById('scan-hint').classList.remove('hidden');
      render();
    };
  } catch(err){
    console.error(err);
    document.getElementById('loading').innerHTML=`
      <div style="text-align:center;padding:2rem;gap:1.2rem;display:flex;flex-direction:column;align-items:center">
        <div style="font-size:3rem">😕</div>
        <h2 style="color:#ff4466;font-size:1.3rem">Camera blocked</h2>
        <p style="color:#ff8899aa;line-height:1.7;max-width:300px;font-size:.88rem">
          Your browser needs camera permission.<br><br>
          <strong>iPhone/Safari:</strong> Settings → Safari → Camera → Allow<br>
          <strong>Android/Chrome:</strong> Tap the 🔒 in the address bar → Camera → Allow<br><br>
          Then reload the page and tap <em>Start Camera</em> again.
        </p>
        <button onclick="location.reload()" style="padding:12px 30px;background:linear-gradient(135deg,#ff2255,#ff6688);border:none;border-radius:25px;color:#fff;font-size:1rem;cursor:pointer;box-shadow:0 0 20px #ff446655">🔄 Reload & Try Again</button>
        <button onclick="startDemo()" style="padding:10px 25px;background:transparent;border:1px solid #ff446644;border-radius:25px;color:#ff8899;font-size:.9rem;cursor:pointer">✨ Demo Mode instead</button>
      </div>`;
  }
}

/* ─── DEMO MODE ─── */
function startDemo(){
  document.getElementById('splash').style.display='none';
  document.getElementById('loading').classList.remove('show');
  document.getElementById('scan-hint').classList.add('hidden');
  document.getElementById('status').style.display='block';
  document.getElementById('status').textContent='💕 Demo mode — no camera needed';
  document.getElementById('found-banner').classList.add('show');
  initCanvas();
  heartGlowAlpha=1;heartGlowTarget=1;
  burst(heartCX,heartCY,100);
  ringEffects.push({r:0,alpha:1});
  let t2=0;
  function demoLoop(){
    time+=.016;t2++;
    const W=overlayCanvas.width,H=overlayCanvas.height;
    ctx.clearRect(0,0,W,H);
    const g=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)/2);
    g.addColorStop(0,'rgba(20,0,10,.4)');g.addColorStop(1,'rgba(5,0,5,.85)');
    ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
    ringEffects=ringEffects.filter(r=>r.alpha>.01);
    for(const r of ringEffects){r.r+=4;r.alpha*=.95;drawRing(heartCX,heartCY,r.r,r.alpha);}
    drawGlowHeart(heartCX,heartCY,heartSize*.85,1,time);
    if(t2%10===0)burst(heartCX,heartCY,6);
    if(t2%50===0){burst(heartCX,heartCY,40);ringEffects.push({r:0,alpha:.8});}
    particles=particles.filter(p=>p.life>0);
    for(const p of particles){p.update(particles);p.draw(ctx);}
    requestAnimationFrame(demoLoop);
  }
  demoLoop();
}

window.startCamera=startCamera;
window.startDemo=startDemo;
</script>
</body>
</html>
