<script>
/* ══════════════════════════════════
   PARTICLES
══════════════════════════════════ */
class Spark {
  constructor(x,y,vx,vy,color){
    this.x=x;this.y=y;this.vx=vx;this.vy=vy;this.color=color;
    this.size=Math.random()*5+1;this.life=1;
    this.decay=Math.random()*.018+.006;this.trail=[];
  }
  update(){
    this.trail.push({x:this.x,y:this.y});
    if(this.trail.length>10)this.trail.shift();
    this.x+=this.vx;this.y+=this.vy;
    this.vy+=.1;this.vx*=.98;
    this.life-=this.decay;this.size*=.98;
  }
  draw(c){
    if(this.life<=0)return;
    for(let i=0;i<this.trail.length;i++){
      const t=this.trail[i],f=i/this.trail.length;
      c.save();c.globalAlpha=f*this.life*.4;
      c.fillStyle=this.color;c.shadowColor=this.color;c.shadowBlur=10;
      c.beginPath();c.arc(t.x,t.y,this.size*.6*f,0,Math.PI*2);c.fill();c.restore();
    }
    c.save();c.globalAlpha=this.life;
    c.fillStyle=this.color;c.shadowColor=this.color;c.shadowBlur=16;
    c.beginPath();c.arc(this.x,this.y,this.size,0,Math.PI*2);c.fill();c.restore();
  }
}
class Ember {
  constructor(cx,cy){
    const a=Math.random()*Math.PI*2,s=Math.random()*11+3;
    this.x=cx+(Math.random()-.5)*40;this.y=cy+(Math.random()-.5)*40;
    this.vx=Math.cos(a)*s;this.vy=Math.sin(a)*s-4;
    const C=['#ff2255','#ff6688','#ffaa33','#ff44cc','#ffffff','#ffdd55','#44ffcc','#ff88aa','#ffcc00'];
    this.color=C[Math.floor(Math.random()*C.length)];
    this.size=Math.random()*7+2;this.life=1;
    this.decay=Math.random()*.011+.004;this.sparkChance=.1;this.trail=[];
  }
  update(all){
    this.trail.push({x:this.x,y:this.y});
    if(this.trail.length>14)this.trail.shift();
    this.x+=this.vx;this.y+=this.vy;
    this.vy+=.07;this.vx*=.97;
    this.life-=this.decay;this.size*=.97;
    if(Math.random()<this.sparkChance&&this.life>.3){
      const a2=Math.random()*Math.PI*2,s2=Math.random()*4+1;
      all.push(new Spark(this.x,this.y,Math.cos(a2)*s2,Math.sin(a2)*s2-1.5,this.color));
    }
  }
  draw(c){
    if(this.life<=0)return;
    for(let i=0;i<this.trail.length;i++){
      const t=this.trail[i],f=i/this.trail.length;
      c.save();c.globalAlpha=f*this.life*.55;
      c.fillStyle=this.color;c.shadowColor=this.color;c.shadowBlur=22;
      c.beginPath();c.arc(t.x,t.y,this.size*f,0,Math.PI*2);c.fill();c.restore();
    }
    c.save();c.globalAlpha=this.life;
    c.fillStyle=this.color;c.shadowColor=this.color;c.shadowBlur=28;
    c.beginPath();c.arc(this.x,this.y,this.size,0,Math.PI*2);c.fill();
    c.fillStyle='white';c.shadowBlur=6;c.globalAlpha=this.life*.85;
    c.beginPath();c.arc(this.x,this.y,this.size*.4,0,Math.PI*2);c.fill();c.restore();
  }
}

/* ══════════════════════════════════
   CAKE
══════════════════════════════════ */
function drawBigCake(c, cx, cy, masterScale, alpha, t) {
  if(alpha < 0.01) return;
  c.save();
  c.globalAlpha = alpha;
  c.translate(cx, cy);
  c.scale(masterScale, masterScale);

  const tiers = [
    { hw:160, h:70, col:'#e8294e', top:'#f04060' },
    { hw:115, h:60, col:'#f5416b', top:'#ff5580' },
    { hw: 75, h:50, col:'#ff6688', top:'#ff88aa' },
  ];

  let baseY = 0;

  // plate
  c.save();
  c.fillStyle='#f5c842'; c.shadowColor='#c8a020'; c.shadowBlur=14;
  c.beginPath(); c.ellipse(0,10,175,18,0,0,Math.PI*2); c.fill();
  c.fillStyle='#ffe070';
  c.beginPath(); c.ellipse(0,6,170,14,0,0,Math.PI*2); c.fill();
  c.restore();

  tiers.forEach((tier,ti)=>{
    const {hw,h,col,top}=tier, by=baseY;
    c.save();
    c.fillStyle=col; c.shadowColor='#aa0030'; c.shadowBlur=8;
    c.beginPath();
    c.moveTo(-hw,by); c.lineTo(-hw,by-h+10);
    c.quadraticCurveTo(-hw,by-h,-hw+10,by-h);
    c.lineTo(hw-10,by-h); c.quadraticCurveTo(hw,by-h,hw,by-h+10);
    c.lineTo(hw,by); c.closePath(); c.fill();
    c.restore();
    // highlight
    c.save(); c.fillStyle='rgba(255,255,255,0.12)';
    c.beginPath(); c.moveTo(-hw+4,by-8); c.lineTo(-hw+4,by-h+14);
    c.quadraticCurveTo(-hw+4,by-h+4,-hw+14,by-h+4);
    c.lineTo(hw-14,by-h+4); c.quadraticCurveTo(hw-4,by-h+4,hw-4,by-h+14);
    c.lineTo(hw-4,by-8); c.closePath(); c.fill(); c.restore();
    // top face
    c.save(); c.fillStyle=top; c.strokeStyle='rgba(255,50,80,.5)'; c.lineWidth=2;
    c.beginPath(); c.ellipse(0,by-h,hw,hw*0.24,0,0,Math.PI*2); c.fill(); c.stroke(); c.restore();
    // frosting drips
    const dn=Math.round(hw/22);
    c.save(); c.fillStyle='#fff'; c.shadowColor='#eee'; c.shadowBlur=5;
    for(let d=0;d<dn;d++){
      const dx=-hw+hw*2/(dn-1||1)*d, dh=14+Math.sin(d*2.1+ti*1.3)*8, dw=10+Math.sin(d*1.5)*4;
      c.beginPath(); c.moveTo(dx-dw/2,by-h+4);
      c.bezierCurveTo(dx-dw/2,by-h+dh,dx+dw/2,by-h+dh,dx+dw/2,by-h+4);
      c.closePath(); c.fill();
    }
    c.fillStyle='rgba(255,255,255,0.55)';
    c.beginPath(); c.ellipse(0,by-h,hw*.8,hw*0.16,0,0,Math.PI*2); c.fill(); c.restore();
    // sprinkles
    c.save();
    const sc2=['#ffee44','#44ffcc','#ff44cc','#44aaff','#ff8833'];
    const sn=Math.round(hw/14);
    for(let d=0;d<sn;d++){
      const dx=-hw*.88+hw*1.76/(sn-1)*d, dy=by-h*.38-Math.sin(d*1.2+ti)*h*.22;
      c.fillStyle=sc2[d%sc2.length]; c.shadowColor=sc2[d%sc2.length]; c.shadowBlur=6;
      c.save(); c.translate(dx,dy); c.rotate(d*.6); c.fillRect(-5,-2,10,4); c.restore();
    }
    c.restore();
    baseY-=h;
  });

  // candles
  const topY=baseY;
  const cxs=[-54,-36,-18,0,18,36,54];
  const cc=['#ff3344','#3399ff','#ffcc00','#aa44ff','#44dd88','#ff8833','#ff44aa'];
  cxs.forEach((cx2,i)=>{
    const cBase=topY, cH=28;
    c.save(); c.fillStyle=cc[i]; c.strokeStyle='rgba(0,0,0,0.25)'; c.lineWidth=1.5;
    c.beginPath(); c.roundRect(cx2-6,cBase-cH,12,cH,3); c.fill(); c.stroke();
    c.fillStyle='rgba(255,255,255,0.4)';
    for(let s=0;s<4;s++) c.fillRect(cx2-6,cBase-cH+s*7,12,3.5);
    c.restore();
    const flk=Math.sin(t*9+i*1.7)*2.5, fh=18+flk;
    c.save(); c.fillStyle='#ff8800'; c.shadowColor='#ffaa00'; c.shadowBlur=18;
    c.beginPath(); c.moveTo(cx2,cBase-cH-fh);
    c.bezierCurveTo(cx2+8,cBase-cH-fh*.5,cx2+5,cBase-cH,cx2,cBase-cH);
    c.bezierCurveTo(cx2-5,cBase-cH,cx2-8,cBase-cH-fh*.5,cx2,cBase-cH-fh);
    c.fill();
    c.fillStyle='#ffff88'; c.shadowColor='#ffff00'; c.shadowBlur=10;
    c.beginPath(); c.moveTo(cx2,cBase-cH-fh*.72);
    c.bezierCurveTo(cx2+4,cBase-cH-fh*.4,cx2+3,cBase-cH,cx2,cBase-cH);
    c.bezierCurveTo(cx2-3,cBase-cH,cx2-4,cBase-cH-fh*.4,cx2,cBase-cH-fh*.72);
    c.fill(); c.restore();
  });

  // big text on bottom tier
  const textY = -tiers[0].h * 0.5;
  c.save(); c.font='bold 32px Georgia,serif'; c.textAlign='center'; c.textBaseline='middle';
  c.strokeStyle='#880022'; c.lineWidth=7; c.lineJoin='round';
  c.strokeText('Eran loves Mika',0,textY);
  c.shadowColor='#ff2255'; c.shadowBlur=22; c.fillStyle='#fff';
  c.globalAlpha=alpha*(0.9+Math.sin(t*2.5)*.1);
  c.fillText('Eran loves Mika',0,textY);
  c.shadowBlur=0; c.fillStyle='#ffe0ea'; c.globalAlpha=alpha;
  c.fillText('Eran loves Mika',0,textY);
  c.restore();

  c.restore();
}

/* ══════════════════════════════════
   HEART SHAPE DETECTOR
   — checks actual heart geometry, not just red pixels
══════════════════════════════════ */

// Returns a score 0..1 indicating how heart-like the pixel grid looks
// Grid is a 2D boolean array [row][col], dims gridH x gridW
function scoreHeartShape(grid, gridW, gridH) {
  // ── 1. ASPECT RATIO: heart is roughly as wide as it is tall (0.75–1.25) ──
  // Already guaranteed by caller, skip here.

  // ── 2. SYMMETRY: left half should mirror right half ──
  let symMatch=0, symTotal=0;
  const midX = Math.floor(gridW/2);
  for(let r=0;r<gridH;r++){
    for(let c=0;c<midX;c++){
      const mirror = gridW-1-c;
      symTotal++;
      if(grid[r][c] === grid[r][mirror]) symMatch++;
    }
  }
  const symmetry = symMatch/symTotal; // 1.0 = perfectly symmetric
  if(symmetry < 0.55) return 0; // reject asymmetric blobs

  // ── 3. TOP-HALF vs BOTTOM-HALF width profile ──
  // Heart: top half has TWO wide bumps, bottom half NARROWS to a point
  const topHalf   = Math.floor(gridH * 0.5);
  const btmStart  = topHalf;

  // Compute width of each row (leftmost to rightmost set pixel)
  const rowWidths = [];
  for(let r=0;r<gridH;r++){
    let lo=gridW, hi=-1;
    for(let c=0;c<gridW;c++){
      if(grid[r][c]){ if(c<lo)lo=c; if(c>hi)hi=c; }
    }
    rowWidths.push(hi>=lo ? hi-lo+1 : 0);
  }

  // Average width in top quarter vs bottom quarter
  const q = Math.floor(gridH/4);
  let topW=0, botW=0, topN=0, botN=0;
  for(let r=q; r<q*2; r++){    topW+=rowWidths[r]; topN++; }
  for(let r=gridH-q; r<gridH; r++){ botW+=rowWidths[r]; botN++; }
  const avgTop = topN>0 ? topW/topN : 0;
  const avgBot = botN>0 ? botW/botN : 0;
  // Bottom should be significantly narrower than top
  const taperRatio = avgTop > 0 ? avgBot/avgTop : 1;
  if(taperRatio > 0.65) return 0; // bottom is too wide — not a heart

  // ── 4. TWO BUMPS in top third ──
  // Scan across middle of top third and look for a DIP in the center
  // (the cleft between the two lobes)
  const scanRow = Math.floor(gridH * 0.22); // ~22% down from top
  let rowPixels = [];
  for(let c=0;c<gridW;c++) rowPixels.push(grid[scanRow] && grid[scanRow][c] ? 1 : 0);

  // Smooth the row
  const smooth = rowPixels.map((_,i)=>{
    let s=0, n=0;
    for(let d=-2;d<=2;d++){ if(i+d>=0&&i+d<gridW){s+=rowPixels[i+d];n++;} }
    return s/n;
  });

  // Find left peak, center dip, right peak
  const leftThird  = Math.floor(gridW*0.2);
  const rightThird = Math.floor(gridW*0.8);
  const centerQ    = Math.floor(gridW*0.45);
  const centerQ2   = Math.floor(gridW*0.55);

  const leftPeak  = Math.max(...smooth.slice(leftThird, midX));
  const rightPeak = Math.max(...smooth.slice(midX, rightThird));
  const centerDip = Math.min(...smooth.slice(centerQ, centerQ2));

  // Both bumps should be present and center should dip below them
  const bumpStrength = Math.min(leftPeak,rightPeak) > 0.1
    ? (Math.min(leftPeak,rightPeak) - centerDip) / Math.max(Math.min(leftPeak,rightPeak), 0.001)
    : 0;
  if(bumpStrength < 0.15) return 0; // no clear double-bump

  // ── 5. BOTTOM POINT: bottom rows should converge to narrow tip ──
  const lastRows = rowWidths.slice(Math.floor(gridH*0.75));
  const isNarrowing = lastRows.every((w,i)=> i===0 || w <= lastRows[i-1]*1.3);
  // (allow slight noise with *1.3 tolerance)
  if(!isNarrowing) return 0;

  // ── 6. OUTLINE vs FILLED: real drawing = thin strokes, not solid fill ──
  // Count "interior" pixels (surrounded on all 4 sides by set pixels)
  let interiorCount=0, totalSet=0;
  for(let r=1;r<gridH-1;r++){
    for(let c=1;c<gridW-1;c++){
      if(grid[r][c]){
        totalSet++;
        if(grid[r-1][c]&&grid[r+1][c]&&grid[r][c-1]&&grid[r][c+1]) interiorCount++;
      }
    }
  }
  const fillRatio = totalSet>0 ? interiorCount/totalSet : 0;
  // A drawn outline has low fill ratio (< 0.5). A solid blob is high.
  if(fillRatio > 0.55) return 0; // solid blob, not a drawn heart

  // ── FINAL SCORE ──
  const symScore      = (symmetry - 0.55) / 0.45;       // 0..1
  const taperScore    = (0.65 - taperRatio) / 0.65;      // 0..1
  const bumpScore     = Math.min(bumpStrength / 0.5, 1); // 0..1
  const outlineScore  = 1 - fillRatio;                   // 0..1

  return (symScore*0.3 + taperScore*0.3 + bumpScore*0.25 + outlineScore*0.15);
}

/* ══════════════════════════════════
   MAIN DETECTION FUNCTION
══════════════════════════════════ */
let debugMode = false;
function toggleDebug(){ debugMode=!debugMode; }

function analyzeFrame() {
  if(!videoEl || videoEl.readyState<2) return;

  const DW = detCanvas.width, DH = detCanvas.height;
  detCtx.drawImage(videoEl, 0, 0, DW, DH);
  const data = detCtx.getImageData(0, 0, DW, DH).data;

  // ── STEP 1: build binary mask of "could be heart ink" pixels ──
  // The heart is drawn with dark maroon/red pen on light paper
  // We detect: dark-reddish, or near-black (pencil/pen)
  const mask = new Uint8Array(DW * DH);
  let minX=DW, maxX=0, minY=DH, maxY=0, cnt=0;

  for(let i=0; i<data.length; i+=4){
    const r=data[i], g=data[i+1], b=data[i+2];
    const px=(i/4)%DW, py=Math.floor((i/4)/DW);

    // Detect dark-red / maroon ink (the heart color)
    const isDarkRed = (r>60 && r<200) && g<70 && b<80 && r>(g+20) && r>(b+15);
    // Also detect very dark near-black strokes (some pens look almost black)
    const isVeryDark = r<60 && g<60 && b<60;

    if(isDarkRed || isVeryDark){
      mask[py*DW+px]=1; cnt++;
      if(px<minX)minX=px; if(px>maxX)maxX=px;
      if(py<minY)minY=py; if(py>maxY)maxY=py;
    }
  }

  // ── STEP 2: reject trivially bad candidates ──
  if(cnt < 80){
    confidence = Math.max(0, confidence - 0.08);
    return;
  }

  const bw=maxX-minX+1, bh=maxY-minY+1;
  if(bw<20 || bh<20){
    confidence = Math.max(0, confidence - 0.08);
    return;
  }

  // Aspect ratio must be heart-like
  const asp = bw/bh;
  if(asp < 0.55 || asp > 1.6){
    confidence = Math.max(0, confidence - 0.08);
    return;
  }

  // Overall density: not too sparse, not too solid
  const density = cnt/(bw*bh);
  if(density < 0.02 || density > 0.5){
    confidence = Math.max(0, confidence - 0.08);
    return;
  }

  // ── STEP 3: extract sub-grid around the blob and score its shape ──
  // Resample into a normalised 32x32 grid for shape analysis
  const GRID = 32;
  const grid = Array.from({length:GRID}, ()=>new Uint8Array(GRID));

  for(let gr=0; gr<GRID; gr++){
    for(let gc=0; gc<GRID; gc++){
      // Map grid cell to source pixel region
      const x0 = minX + Math.floor(gc*bw/GRID);
      const y0 = minY + Math.floor(gr*bh/GRID);
      const x1 = minX + Math.floor((gc+1)*bw/GRID);
      const y1 = minY + Math.floor((gr+1)*bh/GRID);
      // Count set pixels in this region
      let setCount=0, total=0;
      for(let py=y0; py<=Math.min(y1,DH-1); py++){
        for(let px=x0; px<=Math.min(x1,DW-1); px++){
          total++;
          if(mask[py*DW+px]) setCount++;
        }
      }
      grid[gr][gc] = (total>0 && setCount/total > 0.15) ? 1 : 0;
    }
  }

  const score = scoreHeartShape(grid, GRID, GRID);

  // ── STEP 4: update confidence with the shape score ──
  // High score → ramp up quickly; low score → ramp down quickly
  if(score > 0.35){
    // Scale gain by how good the score is
    const gain = 0.06 + score * 0.08; // 0.06..0.14
    confidence = Math.min(1, confidence + gain);
    detectedBounds = {x:minX, y:minY, w:bw, h:bh};
  } else {
    confidence = Math.max(0, confidence - 0.12); // drop fast on bad frames
  }

  // ── DEBUG: draw the 32x32 grid and score ──
  if(debugMode && ctx){
    const W=overlayCanvas.width, H=overlayCanvas.height;
    const cell=6;
    const ox=10, oy=60;
    for(let gr=0;gr<GRID;gr++){
      for(let gc=0;gc<GRID;gc++){
        ctx.fillStyle = grid[gr][gc] ? '#ff4466' : 'rgba(255,255,255,0.05)';
        ctx.fillRect(ox+gc*cell, oy+gr*cell, cell-1, cell-1);
      }
    }
    ctx.fillStyle='#fff';
    ctx.font='12px monospace';
    ctx.fillText(`score:${score.toFixed(2)} conf:${confidence.toFixed(2)}`, ox, oy+GRID*cell+14);
  }
}

/* ══════════════════════════════════
   STATE & RENDER GLOBALS
══════════════════════════════════ */
let overlayCanvas, ctx, videoEl;
let detCanvas, detCtx;
let particles=[], ringEffects=[];
let found=false, confidence=0;
let heartCX=0, heartCY=0, heartSize=100;
let heartGlowAlpha=0, heartGlowTarget=0;
let cakeAlpha=0, cakeTarget=0, cakeEntrance=0;
let burstTimer=0, time=0, lastDetect=0;
let detectedBounds=null;

function burst(cx,cy,n){ for(let i=0;i<n;i++) particles.push(new Ember(cx,cy)); }

function heartPath(c,cx,cy,s){
  c.beginPath();
  for(let t=0;t<=Math.PI*2;t+=.04){
    const x=s*16*Math.pow(Math.sin(t),3)/16;
    const y=-s*(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t))/16;
    t<.02?c.moveTo(cx+x,cy+y):c.lineTo(cx+x,cy+y);
  }
  c.closePath();
}

function drawGlowHeart(cx,cy,s,alpha,t){
  const ss=s*(1+Math.sin(t*3)*.06);
  for(let i=4;i>=0;i--){
    ctx.save();ctx.globalAlpha=alpha*(.12-i*.02);
    ctx.strokeStyle='#ff2255';ctx.lineWidth=5+i*10;
    ctx.shadowColor='#ff2255';ctx.shadowBlur=35+i*12;
    ctx.lineJoin='round';heartPath(ctx,cx,cy,ss);ctx.stroke();ctx.restore();
  }
  ctx.save();ctx.globalAlpha=alpha;
  ctx.strokeStyle='#ff6688';ctx.lineWidth=2.5;
  ctx.shadowColor='#ff99aa';ctx.shadowBlur=18;
  ctx.lineJoin='round';heartPath(ctx,cx,cy,ss);ctx.stroke();ctx.restore();
}

function drawRing(cx,cy,r,alpha){
  ctx.save();ctx.globalAlpha=alpha;
  ctx.strokeStyle='#ff4466';ctx.lineWidth=2.5;
  ctx.shadowColor='#ff4466';ctx.shadowBlur=22;
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.stroke();ctx.restore();
}

/* ══════════════════════════════════
   RENDER LOOP
══════════════════════════════════ */
function render(){
  time+=.016;
  const W=overlayCanvas.width, H=overlayCanvas.height;
  ctx.clearRect(0,0,W,H);

  if(Date.now()-lastDetect > 80){ analyzeFrame(); lastDetect=Date.now(); }

  // Threshold: need confidence > 0.6 AND it must have been sustained
  // (confidence can't reach 0.6 in fewer than ~5 good frames)
  const isDetected = confidence > 0.60 && detectedBounds;

  if(isDetected){
    heartGlowTarget=1; cakeTarget=1;
    const sx=W/detCanvas.width, sy=H/detCanvas.height;
    const tx=(detectedBounds.x+detectedBounds.w/2)*sx;
    const ty=(detectedBounds.y+detectedBounds.h/2)*sy;
    heartCX=heartCX*.88+tx*.12;
    heartCY=heartCY*.88+ty*.12;
    const ts=Math.max(detectedBounds.w,detectedBounds.h)*Math.min(sx,sy)*.5;
    heartSize=heartSize*.88+ts*.12;
    if(!found){
      found=true;
      document.getElementById('found-banner').classList.add('show');
      document.getElementById('scan-hint').classList.add('hidden');
      document.getElementById('status').textContent='🎂 Eran loves Mika! 💕';
      burst(heartCX,heartCY,120);
      ringEffects.push({r:0,alpha:1});
      ringEffects.push({r:0,alpha:.75});
    }
    burstTimer++;
    if(burstTimer%7===0)  burst(heartCX,heartCY,5);
    if(burstTimer%40===0){ burst(heartCX,heartCY,35); ringEffects.push({r:0,alpha:.85}); }
  } else {
    heartGlowTarget=0; cakeTarget=0;
    if(found && confidence<0.25){
      found=false; burstTimer=0;
      document.getElementById('found-banner').classList.remove('show');
      document.getElementById('scan-hint').classList.remove('hidden');
      document.getElementById('status').textContent='🔍 Scanning for heart…';
    }
  }

  heartGlowAlpha = heartGlowAlpha*.9  + heartGlowTarget*.1;
  cakeAlpha      = cakeAlpha*.93      + cakeTarget*.07;
  cakeEntrance   = cakeEntrance*.93   + (cakeTarget>.05?1:0)*.07;

  ringEffects=ringEffects.filter(r=>r.alpha>.01);
  for(const r of ringEffects){ r.r+=5; r.alpha*=.94; drawRing(heartCX,heartCY,r.r,r.alpha); }

  if(heartGlowAlpha>.05&&heartSize>10)
    drawGlowHeart(heartCX,heartCY,heartSize*.85,heartGlowAlpha,time);

  if(cakeAlpha>.02){
    const screenCX=W/2, screenCY=H/2+30;
    const desiredH=H*0.68;
    const localH=70+60+50+46;
    const sc=(desiredH/localH)*cakeEntrance;
    const bs=sc*(1+Math.sin(Math.max(0,(cakeEntrance-.5)*Math.PI))*.08);
    drawBigCake(ctx,screenCX,screenCY,bs,cakeAlpha,time);
  }

  particles=particles.filter(p=>p.life>0);
  for(const p of particles){ p.update(particles); p.draw(ctx); }

  requestAnimationFrame(render);
}

/* ══════════════════════════════════
   INIT
══════════════════════════════════ */
function initCanvas(){
  overlayCanvas=document.getElementById('overlay-canvas');
  ctx=overlayCanvas.getContext('2d');
  detCanvas=document.createElement('canvas');
  detCanvas.width=200; detCanvas.height=150; // slightly bigger for better shape analysis
  detCtx=detCanvas.getContext('2d',{willReadFrequently:true});
  function resize(){ overlayCanvas.width=window.innerWidth; overlayCanvas.height=window.innerHeight; }
  resize(); window.addEventListener('resize',resize);
  heartCX=window.innerWidth/2; heartCY=window.innerHeight/2;
  heartSize=Math.min(window.innerWidth,window.innerHeight)*.2;
}

async function startCamera(){
  document.getElementById('splash').style.display='none';
  document.getElementById('loading').classList.add('show');
  videoEl=document.getElementById('video-el');
  initCanvas();
  try{
    const stream=await navigator.mediaDevices.getUserMedia({
      video:{facingMode:{ideal:'environment'},width:{ideal:1280},height:{ideal:720}},audio:false
    });
    videoEl.srcObject=stream;
    videoEl.onloadedmetadata=()=>{
      videoEl.play();
      document.getElementById('loading').classList.remove('show');
      document.getElementById('status').style.display='block';
      document.getElementById('scan-hint').classList.remove('hidden');
      document.getElementById('debugBtn').style.display='block';
      render();
    };
  }catch(err){
    document.getElementById('loading').innerHTML=`
      <div style="text-align:center;padding:2rem;gap:1.2rem;display:flex;flex-direction:column;align-items:center">
        <div style="font-size:3rem">😕</div>
        <h2 style="color:#ff4466;font-size:1.3rem">Camera blocked</h2>
        <p style="color:#ff8899aa;line-height:1.7;max-width:300px;font-size:.88rem">
          <strong>iPhone/Safari:</strong> Settings → Safari → Camera → Allow<br>
          <strong>Android/Chrome:</strong> Tap 🔒 in address bar → Camera → Allow<br><br>
          Then reload and tap <em>Start Camera</em>.
        </p>
        <button onclick="location.reload()" style="padding:12px 30px;background:linear-gradient(135deg,#ff2255,#ff6688);border:none;border-radius:25px;color:#fff;font-size:1rem;cursor:pointer">🔄 Reload</button>
        <button onclick="startDemo()" style="padding:10px 25px;background:transparent;border:1px solid #ff446644;border-radius:25px;color:#ff8899;font-size:.9rem;cursor:pointer">✨ Demo Mode</button>
      </div>`;
  }
}

function startDemo(){
  document.getElementById('splash').style.display='none';
  document.getElementById('loading').classList.remove('show');
  document.getElementById('scan-hint').classList.add('hidden');
  document.getElementById('status').style.display='block';
  document.getElementById('status').textContent='🎂 Eran loves Mika! 💕';
  document.getElementById('found-banner').classList.add('show');
  initCanvas();
  heartGlowAlpha=1; heartGlowTarget=1;
  cakeAlpha=1; cakeTarget=1; cakeEntrance=1;
  burst(heartCX,heartCY,140);
  ringEffects.push({r:0,alpha:1});
  let t2=0;
  function demoLoop(){
    time+=.016; t2++;
    const W=overlayCanvas.width, H=overlayCanvas.height;
    ctx.clearRect(0,0,W,H);
    const g=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)/2);
    g.addColorStop(0,'rgba(20,0,10,.5)'); g.addColorStop(1,'rgba(4,0,4,.92)');
    ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
    drawGlowHeart(W/2,H/2,Math.min(W,H)*.42,0.85,time);
    ringEffects=ringEffects.filter(r=>r.alpha>.01);
    for(const r of ringEffects){ r.r+=5; r.alpha*=.94; drawRing(W/2,H/2,r.r,r.alpha); }
    const dH=H*0.68, lH=70+60+50+46, sc=dH/lH;
    drawBigCake(ctx,W/2,H/2+30,sc,1,time);
    if(t2%8===0)  burst(W/2,H/2,6);
    if(t2%50===0){ burst(W/2,H/2,45); ringEffects.push({r:0,alpha:.85}); }
    particles=particles.filter(p=>p.life>0);
    for(const p of particles){ p.update(particles); p.draw(ctx); }
    requestAnimationFrame(demoLoop);
  }
  demoLoop();
}

window.startCamera=startCamera;
window.startDemo=startDemo;
window.toggleDebug=toggleDebug;
</script>
